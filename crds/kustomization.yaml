# CRD bundle for ugallu Wave 1.
# Sources are generated from sdk/pkg/api/v1alpha1 via:
#   task generate
# (which runs `controller-gen crd paths=./pkg/api/v1alpha1/... output:crd:dir=../crds/bases`)
#
# This kustomization is consumed by the umbrella Helm subchart `crds/`
# (see charts/ugallu/charts/crds/) which deploys these CRDs in Wave -1.
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - bases/security.ugallu.io_securityevents.yaml
  - bases/security.ugallu.io_eventresponses.yaml
  - bases/security.ugallu.io_attestationbundles.yaml
  - bases/security.ugallu.io_attestorconfigs.yaml
  - bases/security.ugallu.io_wormconfigs.yaml
  - bases/security.ugallu.io_ttlconfigs.yaml
  - bases/security.ugallu.io_gitopsresponderconfigs.yaml
