---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: compliancescanruns.security.ugallu.io
spec:
  group: security.ugallu.io
  names:
    kind: ComplianceScanRun
    listKind: ComplianceScanRunList
    plural: compliancescanruns
    shortNames:
    - csr
    singular: compliancescanrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.backend
      name: Backend
      type: string
    - jsonPath: .spec.profile
      name: Profile
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ComplianceScanRun is one scan cycle.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ComplianceScanRunSpec is the runtime config the
              ugallu-compliance-scan operator reads to drive a single scan.
            properties:
              backend:
                description: Backend selects the scanner.
                enum:
                - kube-bench
                - falco
                - cel-custom
                type: string
              controlMappings:
                description: |-
                  ControlMappings carries the SOC2 / ISO27001 mapping the
                  reporter stamps on the produced result. Empty means the
                  reporter falls back to the in-tree default mapping.
                items:
                  description: |-
                    ControlMapping links a CIS / Falco / CEL check id to the
                    regulatory framework's control id.
                  properties:
                    checkID:
                      description: CheckID is the scanner-native identifier.
                      type: string
                    frameworks:
                      description: |-
                        Frameworks lists the framework→controlID pairs this check
                        satisfies (SOC2 / ISO27001 / PCI-DSS / NIST 800-53).
                      items:
                        description: FrameworkControl is one (framework, controlID)
                          pair.
                        properties:
                          controlID:
                            description: ControlID inside the framework.
                            type: string
                          name:
                            description: |-
                              Name of the regulatory framework, lowercase
                              (soc2|iso27001|pci-dss|nist-800-53|custom).
                            enum:
                            - soc2
                            - iso27001
                            - pci-dss
                            - nist-800-53
                            - custom
                            type: string
                        required:
                        - controlID
                        - name
                        type: object
                      type: array
                      x-kubernetes-list-type: atomic
                  required:
                  - checkID
                  - frameworks
                  type: object
                type: array
              profile:
                description: |-
                  Profile is a backend-specific identifier.
                    - kube-bench: a target version, e.g. "cis-1.10".
                    - falco:      the Falco source name (e.g. "ruleset-1").
                    - cel-custom: the operator-side rule pack name.
                type: string
              timeout:
                default: 10m
                description: |-
                  Timeout caps the total scan duration. Bounded server-side at
                  30m by admission policy 15.
                type: string
            required:
            - backend
            - profile
            - timeout
            type: object
          status:
            description: ComplianceScanRunStatus tracks lifecycle.
            properties:
              completionTime:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                type: string
              resultRef:
                description: |-
                  ResultRef points to the ComplianceScanResult the run wrote.
                  Empty until Phase=Succeeded.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              startTime:
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
