---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: seccomptrainingprofiles.security.ugallu.io
spec:
  group: security.ugallu.io
  names:
    kind: SeccompTrainingProfile
    listKind: SeccompTrainingProfileList
    plural: seccomptrainingprofiles
    shortNames:
    - stp
    singular: seccomptrainingprofile
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.derivedFromRun.name
      name: Run
      type: string
    - jsonPath: .status.appliedPodCount
      name: Applied
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SeccompTrainingProfile is the seccomp.json output of a training
          run. Lives in the same namespace as the run that produced it.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SeccompTrainingProfileSpec is the produced seccomp.json plus the
              metadata callers need to bind it to a Pod.
            properties:
              defaultAction:
                description: |-
                  DefaultAction is the action stamped on every syscall not
                  listed in the profile (mirrors the run's DefaultAction).
                enum:
                - SCMP_ACT_ERRNO
                - SCMP_ACT_KILL
                - SCMP_ACT_LOG
                - SCMP_ACT_TRACE
                type: string
              derivedFromRun:
                description: |-
                  DerivedFromRun is the SeccompTrainingRun that produced this
                  profile. Same namespace.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              podSelector:
                description: |-
                  PodSelector is the label selector the profile applier (a
                  ValidatingAdmissionPolicy in mutating mode) uses to decide
                  which incoming Pods receive the profile via the
                  PodSpec.SecurityContext.SeccompProfile localhost path.
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              profileJSON:
                description: |-
                  ProfileJSON is the complete OCI-runtime seccomp profile, in
                  JSON form, the runtime applies via runtime/default-fallback.
                  Stored as raw bytes so the round-trip through the API server
                  doesn't reorder syscall arrays.
                format: byte
                type: string
            required:
            - defaultAction
            - derivedFromRun
            - profileJSON
            type: object
          status:
            description: |-
              SeccompTrainingProfileStatus tracks how widely the profile is
              applied. Updated by the applier.
            properties:
              appliedPodCount:
                description: |-
                  AppliedPodCount is the number of Pods the applier has injected
                  the profile into since publication.
                type: integer
              lastAppliedAt:
                description: LastAppliedAt is the most recent injection timestamp.
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
