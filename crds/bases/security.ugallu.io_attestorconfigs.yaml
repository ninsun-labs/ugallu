---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: attestorconfigs.security.ugallu.io
spec:
  group: security.ugallu.io
  names:
    kind: AttestorConfig
    listKind: AttestorConfigList
    plural: attestorconfigs
    shortNames:
    - attcfg
    singular: attestorconfig
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.signingMode
      name: Mode
      type: string
    - jsonPath: .spec.rekor.url
      name: Rekor
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: AttestorConfig is the namespaced config CR for ugallu-attestor.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: AttestorConfigSpec is the runtime config for the attestor
              (design 06 S8).
            properties:
              dualMode:
                description: DualMode tunes dual-sign verification semantics.
                properties:
                  requireAll:
                    description: 'RequireAll enforces both signatures valid (default
                      false: OR semantics).'
                    type: boolean
                type: object
              fulcio:
                description: Fulcio configures Fulcio keyless signing (used when SigningMode
                  is fulcio-keyless or dual).
                properties:
                  fulcioURL:
                    type: string
                  issuer:
                    type: string
                required:
                - fulcioURL
                - issuer
                type: object
              openbao:
                description: OpenBao configures OpenBao transit signing (used when
                  SigningMode is openbao-transit or dual).
                properties:
                  address:
                    description: |-
                      Address is the OpenBao base URL, e.g.
                      "https://openbao.openbao.svc.cluster.local:8200".
                    type: string
                  authMount:
                    default: auth/kubernetes
                    description: |-
                      AuthMount is the path of the Kubernetes auth method,
                      e.g. "auth/kubernetes". Defaults to "auth/kubernetes".
                    type: string
                  authRole:
                    description: |-
                      AuthRole is the OpenBao Kubernetes auth role bound to the
                      attestor's ServiceAccount. The role must permit the transit
                      sign + read-key policies on the configured KeyName.
                    type: string
                  caBundleSecret:
                    description: |-
                      CABundleSecret references a Secret holding the CA cert that
                      signed the OpenBao server cert (PEM in key "ca.crt"). Empty
                      uses the system CA store.
                    properties:
                      name:
                        type: string
                      namespace:
                        type: string
                    required:
                    - name
                    type: object
                  insecureSkipVerify:
                    default: false
                    description: InsecureSkipVerify disables TLS verification — dev/lab
                      only.
                    type: boolean
                  keyName:
                    description: |-
                      KeyName is the transit key used to sign the in-toto Statement
                      PAE. The key MUST be of type ed25519 for ed25519 attestations
                      (the default), or rsa-pss-sha256/ecdsa-p256 for the matching
                      SigningMode variants.
                    type: string
                  keyType:
                    default: ed25519
                    description: |-
                      KeyType selects the OpenBao transit key type. Maps to the
                      corresponding signature algorithm. Default ed25519 mirrors
                      the in-process Ed25519Signer.
                    enum:
                    - ed25519
                    - ecdsa-p256
                    - rsa-pss-2048
                    type: string
                  transitMount:
                    default: transit
                    description: |-
                      TransitMount is the path of the transit secrets engine,
                      e.g. "transit".
                    type: string
                required:
                - address
                - authRole
                - keyName
                type: object
              rekor:
                description: Rekor configures the transparency log endpoint (always
                  uploaded, design 06).
                properties:
                  enabled:
                    default: true
                    type: boolean
                  url:
                    type: string
                required:
                - url
                type: object
              signingMode:
                default: fulcio-keyless
                description: 'SigningMode selects the cryptographic mode: fulcio-keyless,
                  openbao-transit, or dual.'
                enum:
                - fulcio-keyless
                - openbao-transit
                - dual
                - ed25519-dev
                type: string
            required:
            - rekor
            type: object
        type: object
    served: true
    storage: true
    subresources: {}
