---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: honeypotconfigs.security.ugallu.io
spec:
  group: security.ugallu.io
  names:
    kind: HoneypotConfig
    listKind: HoneypotConfigList
    plural: honeypotconfigs
    shortNames:
    - hpcfg
    singular: honeypotconfig
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.deployedDecoys[*]
      name: Decoys
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          HoneypotConfig is the cluster-scoped resource that declares the
          honeypot decoy set + the detection contract for the
          ugallu-honeypot operator.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              HoneypotConfigSpec declares the decoy K8s resources the honeypot
              operator must materialise + the detection contract that fires
              when an actor reads/touches one of them.

              Pattern: every decoy carries the label
              `ugallu.io/decoy=true` plus an annotation
              `ugallu.io/honeypot-config=<cr-name>` that the detector uses
              to discriminate honeypots from regular cluster state on the
              audit-bus stream.
            properties:
              allowlistedActors:
                description: |-
                  AllowlistedActors enumerates SA usernames
                  (`system:serviceaccount:<ns>:<name>`) that may legitimately
                  touch decoys without firing - typically backup operators
                  or the honeypot operator itself for self-checks.
                items:
                  type: string
                type: array
              decoys:
                description: |-
                  Decoys lists the resources the operator must create + keep
                  reconciled. Empty list = no-op (the CR can stage future
                  decoys without firing them yet).
                items:
                  description: HoneypotDecoy is one decoy declaration.
                  properties:
                    data:
                      additionalProperties:
                        type: string
                      description: |-
                        Data is the optional payload for Secret decoys (key→value).
                        Stored verbatim - for plausibility populate with realistic-
                        looking but fake credentials. Ignored for non-Secret kinds.
                      type: object
                    kind:
                      description: |-
                        Kind is the K8s kind of the decoy. Currently supports Secret
                        and ServiceAccount; ConfigMap and Namespace will be added later.
                      enum:
                      - Secret
                      - ServiceAccount
                      type: string
                    name:
                      description: |-
                        Name is the decoy resource's metadata.name. Choose a name
                        that mimics a legitimate target (e.g. `prod-db-creds`,
                        `backup-uploader`) so the honeypot is plausible.
                      type: string
                    namespace:
                      description: |-
                        Namespace is where the decoy lands. The honeypot operator
                        must have RBAC to create resources of `Kind` in this
                        namespace.
                      type: string
                  required:
                  - kind
                  - name
                  - namespace
                  type: object
                type: array
              emitOnRead:
                default: true
                description: |-
                  EmitOnRead controls whether the detector fires on read-side
                  verbs (get/list/watch). Defaults to true; flip to false to
                  limit firing to mutating verbs (create/update/patch/delete)
                  - useful when the decoy lives in a high-traffic ns and read
                  noise overwhelms triage.
                type: boolean
            type: object
          status:
            description: HoneypotConfigStatus surfaces operator-side observations.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              deployedDecoys:
                description: |-
                  DeployedDecoys lists the decoys currently materialised on
                  the cluster (one entry per Spec.Decoys entry that
                  successfully rendered).
                items:
                  description: DeployedDecoy mirrors the live state of one Spec.Decoys
                    entry.
                  properties:
                    kind:
                      type: string
                    name:
                      type: string
                    namespace:
                      type: string
                    uid:
                      type: string
                  required:
                  - kind
                  - name
                  - namespace
                  - uid
                  type: object
                type: array
              lastReconcileAt:
                description: LastReconcileAt timestamps the most recent successful
                  reconcile.
                format: date-time
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
