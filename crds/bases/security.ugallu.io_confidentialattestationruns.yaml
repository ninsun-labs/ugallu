metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: confidentialattestationruns.security.ugallu.io
spec:
  group: security.ugallu.io
  names:
    kind: ConfidentialAttestationRun
    listKind: ConfidentialAttestationRunList
    plural: confidentialattestationruns
    shortNames:
    - conar
    singular: confidentialattestationrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.backend
      name: Backend
      type: string
    - jsonPath: .spec.targetNodeName
      name: Node
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: ConfidentialAttestationRun is one attestation cycle on one node.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ConfidentialAttestationRunSpec is the runtime config the
              ugallu-confidential-attestation operator reads.
            properties:
              backend:
                description: Backend selects the hardware path.
                enum:
                - tpm
                - sev-snp
                - tdx
                type: string
              nonce:
                description: |-
                  Nonce is the caller-provided anti-replay value (32-byte hex
                  recommended). The attester binds the quote to this nonce so
                  a replay-attack with a previously captured quote is rejected.
                type: string
              policyRef:
                description: |-
                  PolicyRef points to the AttestationPolicy with expected
                  measurements. Empty = "report-only mode": the verifier
                  records the quote but emits an indeterminate verdict.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              targetNodeName:
                description: |-
                  TargetNodeName pins the node the attester DaemonSet must
                  answer from. Required - a cluster-wide attestation cycle is
                  modelled as N runs, one per node.
                type: string
              timeout:
                default: 2m
                description: |-
                  Timeout caps the run duration (TPM quote latency is ~1s but
                  the SEV-SNP attestation service may take longer).
                type: string
            required:
            - backend
            - nonce
            - targetNodeName
            - timeout
            type: object
          status:
            description: ConfidentialAttestationRunStatus tracks lifecycle.
            properties:
              completionTime:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                type: string
              resultRef:
                description: |-
                  ResultRef points to the ConfidentialAttestationResult the
                  run produced. Empty until Phase=Succeeded.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              startTime:
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
