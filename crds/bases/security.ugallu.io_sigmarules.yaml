---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: sigmarules.security.ugallu.io
spec:
  group: security.ugallu.io
  names:
    kind: SigmaRule
    listKind: SigmaRuleList
    plural: sigmarules
    shortNames:
    - sigmarule
    singular: sigmarule
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.emit.securityEventType
      name: Type
      type: string
    - jsonPath: .spec.emit.severity
      name: Severity
      type: string
    - jsonPath: .spec.enabled
      name: Enabled
      type: boolean
    - jsonPath: .status.matchCount
      name: Hits
      type: integer
    - jsonPath: .status.lastMatchedAt
      name: LastMatch
      type: date
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          SigmaRule is a detection rule the audit-detection operator
          evaluates against the apiserver/kubelet audit log stream.
          Cluster-scoped (rules cross namespaces by design).
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              SigmaRuleSpec is the predicate + emit declaration for a single
              detection rule consumed by audit-detection (design 20 §A3-A5).
            properties:
              description:
                description: Description is a free-form human-readable summary.
                maxLength: 1024
                type: string
              emit:
                description: Emit produces the SecurityEvent on match.
                properties:
                  class:
                    allOf:
                    - enum:
                      - Detection
                      - Anomaly
                      - PolicyViolation
                      - Forensic
                      - Compliance
                      - Audit
                    - enum:
                      - Detection
                      - Anomaly
                      - PolicyViolation
                      - Audit
                      - Compliance
                      - Forensic
                    default: Detection
                    description: Class is the top-level classification of a SecurityEvent
                      (design D1, locked enum).
                    type: string
                  securityEventType:
                    description: |-
                      SecurityEventType MUST be a value from the type catalog
                      (design 11). Validated by admission policy 6 at apply-time
                      and re-checked by the engine at runtime.
                    type: string
                  severity:
                    allOf:
                    - enum:
                      - critical
                      - high
                      - medium
                      - low
                      - info
                    - enum:
                      - critical
                      - high
                      - medium
                      - low
                      - info
                    description: Severity is the 5-grade severity scale (design D7).
                    type: string
                  signals:
                    additionalProperties:
                      type: string
                    description: |-
                      Signals are extra k/v pairs baked into SE.Spec.Signals.
                      Templating uses ${verb}, ${user.username}, ${objectRef.name}.
                    type: object
                required:
                - securityEventType
                - severity
                type: object
              enabled:
                default: true
                description: |-
                  Enabled gates whether the engine evaluates this rule. The
                  kubebuilder default fills in true when the user posts a CR
                  without the field; the omitempty tag is dropped on purpose so a
                  Go client setting Enabled=false survives marshal (otherwise the
                  false would be omitted and the apiserver would apply the
                  default).
                type: boolean
              match:
                description: Match is the predicate evaluated against each audit-log
                  entry.
                properties:
                  anyOf:
                    description: |-
                      AnyOf restores OR composition between sibling matches. Each
                      entry is a leaf (no further AnyOf/Not nesting).
                    items:
                      description: |-
                        SigmaMatchLeaf is the leaf shape — every primitive predicate but
                        neither AnyOf nor Not. The split keeps the CRD schema finite while
                        the Go runtime compiles SigmaMatch + SigmaMatchLeaf into the same
                        internal tree.
                      properties:
                        objectRef:
                          description: ObjectRef matches AuditEvent.objectRef.
                          properties:
                            apiGroup:
                              items:
                                type: string
                              type: array
                            apiVersion:
                              items:
                                type: string
                              type: array
                            nameGlob:
                              items:
                                type: string
                              type: array
                            namespace:
                              items:
                                type: string
                              type: array
                            resource:
                              items:
                                type: string
                              type: array
                            subresource:
                              items:
                                type: string
                              type: array
                          type: object
                        requestObjectGlob:
                          description: |-
                            RequestObjectGlob applies (jsonPath, glob) pairs against
                            AuditEvent.requestObject. AND across entries.
                          items:
                            description: |-
                              GlobMatch is a (jsonPath, glob[]) pair applied against the
                              AuditEvent.requestObject body.
                            properties:
                              jsonPath:
                                description: |-
                                  JSONPath is a restricted JSONPath expression, e.g.
                                  "$.spec.containers[*].image".
                                type: string
                              patterns:
                                description: |-
                                  Patterns is a list of globs (any-of). Max 8 `*` wildcards per
                                  pattern, validated by admission policy 6.
                                items:
                                  type: string
                                type: array
                            required:
                            - jsonPath
                            - patterns
                            type: object
                          type: array
                        subresource:
                          description: Subresource matches AuditEvent.objectRef.subresource
                            ("" matches none).
                          items:
                            type: string
                          type: array
                        user:
                          description: User matches AuditEvent.user.
                          properties:
                            groups:
                              items:
                                type: string
                              type: array
                            usernameGlob:
                              items:
                                type: string
                              type: array
                          type: object
                        verb:
                          description: Verb is matched against AuditEvent.verb (any-of
                            semantics).
                          items:
                            enum:
                            - create
                            - update
                            - patch
                            - delete
                            - get
                            - list
                            - watch
                            - deletecollection
                            - connect
                            type: string
                          type: array
                      type: object
                    type: array
                  not:
                    description: Not negates the contained match. Single-level only.
                    properties:
                      objectRef:
                        description: ObjectRef matches AuditEvent.objectRef.
                        properties:
                          apiGroup:
                            items:
                              type: string
                            type: array
                          apiVersion:
                            items:
                              type: string
                            type: array
                          nameGlob:
                            items:
                              type: string
                            type: array
                          namespace:
                            items:
                              type: string
                            type: array
                          resource:
                            items:
                              type: string
                            type: array
                          subresource:
                            items:
                              type: string
                            type: array
                        type: object
                      requestObjectGlob:
                        description: |-
                          RequestObjectGlob applies (jsonPath, glob) pairs against
                          AuditEvent.requestObject. AND across entries.
                        items:
                          description: |-
                            GlobMatch is a (jsonPath, glob[]) pair applied against the
                            AuditEvent.requestObject body.
                          properties:
                            jsonPath:
                              description: |-
                                JSONPath is a restricted JSONPath expression, e.g.
                                "$.spec.containers[*].image".
                              type: string
                            patterns:
                              description: |-
                                Patterns is a list of globs (any-of). Max 8 `*` wildcards per
                                pattern, validated by admission policy 6.
                              items:
                                type: string
                              type: array
                          required:
                          - jsonPath
                          - patterns
                          type: object
                        type: array
                      subresource:
                        description: Subresource matches AuditEvent.objectRef.subresource
                          ("" matches none).
                        items:
                          type: string
                        type: array
                      user:
                        description: User matches AuditEvent.user.
                        properties:
                          groups:
                            items:
                              type: string
                            type: array
                          usernameGlob:
                            items:
                              type: string
                            type: array
                        type: object
                      verb:
                        description: Verb is matched against AuditEvent.verb (any-of
                          semantics).
                        items:
                          enum:
                          - create
                          - update
                          - patch
                          - delete
                          - get
                          - list
                          - watch
                          - deletecollection
                          - connect
                          type: string
                        type: array
                    type: object
                  objectRef:
                    description: ObjectRef matches AuditEvent.objectRef.
                    properties:
                      apiGroup:
                        items:
                          type: string
                        type: array
                      apiVersion:
                        items:
                          type: string
                        type: array
                      nameGlob:
                        items:
                          type: string
                        type: array
                      namespace:
                        items:
                          type: string
                        type: array
                      resource:
                        items:
                          type: string
                        type: array
                      subresource:
                        items:
                          type: string
                        type: array
                    type: object
                  requestObjectGlob:
                    description: |-
                      RequestObjectGlob applies (jsonPath, glob) pairs against
                      AuditEvent.requestObject. AND across entries.
                    items:
                      description: |-
                        GlobMatch is a (jsonPath, glob[]) pair applied against the
                        AuditEvent.requestObject body.
                      properties:
                        jsonPath:
                          description: |-
                            JSONPath is a restricted JSONPath expression, e.g.
                            "$.spec.containers[*].image".
                          type: string
                        patterns:
                          description: |-
                            Patterns is a list of globs (any-of). Max 8 `*` wildcards per
                            pattern, validated by admission policy 6.
                          items:
                            type: string
                          type: array
                      required:
                      - jsonPath
                      - patterns
                      type: object
                    type: array
                  subresource:
                    description: Subresource matches AuditEvent.objectRef.subresource
                      ("" matches none).
                    items:
                      type: string
                    type: array
                  user:
                    description: User matches AuditEvent.user.
                    properties:
                      groups:
                        items:
                          type: string
                        type: array
                      usernameGlob:
                        items:
                          type: string
                        type: array
                    type: object
                  verb:
                    description: Verb is matched against AuditEvent.verb (any-of semantics).
                    items:
                      enum:
                      - create
                      - update
                      - patch
                      - delete
                      - get
                      - list
                      - watch
                      - deletecollection
                      - connect
                      type: string
                    type: array
                type: object
              rateLimit:
                description: RateLimit overrides the global token bucket (design 16).
                properties:
                  burst:
                    default: 50
                    type: integer
                  sustainedPerSec:
                    default: 5
                    type: integer
                type: object
              references:
                description: |-
                  References point at upstream rule sources (Sigma community,
                  CIS, etc.) for traceability.
                items:
                  type: string
                type: array
              tags:
                description: Tags are free-form labels for grouping rules in dashboards.
                items:
                  type: string
                type: array
            required:
            - emit
            - enabled
            - match
            type: object
          status:
            description: SigmaRuleStatus is the runtime feedback the controller writes
              back.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              droppedRateLimit:
                description: DroppedRateLimit counts hits dropped by the per-rule
                  bucket.
                format: int64
                type: integer
              lastMatchedAt:
                description: LastMatchedAt marks the most recent emit triggered by
                  the rule.
                format: date-time
                type: string
              matchCount:
                description: |-
                  MatchCount is the lifetime hit count, best-effort sum across
                  replicas (informers may double-count during failover).
                format: int64
                type: integer
              parseError:
                description: |-
                  ParseError, if non-empty, marks the rule as runtime-invalid
                  (e.g. catalog drift). Admission policy 6 catches most cases at
                  apply-time; this surfaces residual drift.
                type: string
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
