---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: confidentialattestationresults.security.ugallu.io
spec:
  group: security.ugallu.io
  names:
    kind: ConfidentialAttestationResult
    listKind: ConfidentialAttestationResultList
    plural: confidentialattestationresults
    shortNames:
    - conares
    singular: confidentialattestationresult
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.backend
      name: Backend
      type: string
    - jsonPath: .spec.nodeName
      name: Node
      type: string
    - jsonPath: .spec.verdict
      name: Verdict
      type: string
    - jsonPath: .status.trusted
      name: Trusted
      type: boolean
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          ConfidentialAttestationResult is the verifier's per-run report.
          Retained 7d by ugallu-ttl; the linked AttestationBundle captures
          the long-term signed snapshot.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              ConfidentialAttestationResultSpec carries the raw evidence + the
              verifier verdict.
            properties:
              backend:
                description: Backend mirrors the run's backend.
                enum:
                - tpm
                - sev-snp
                - tdx
                type: string
              derivedFromRun:
                description: |-
                  DerivedFromRun is the ConfidentialAttestationRun that
                  produced this result. Same namespace.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              measurements:
                description: |-
                  Measurements is the per-slot digest summary the verifier
                  extracted from the quote. Useful for human review without
                  reaching into the raw bytes.
                items:
                  description: |-
                    ConfidentialAttestationMeasurement is one (slot, digest) pair.
                    On TPM the slot is the PCR index (0..23); on SEV-SNP / TDX
                    it's the report field name (e.g. "MEASUREMENT", "REPORT_DATA").
                  properties:
                    digest:
                      type: string
                    slot:
                      type: string
                  required:
                  - digest
                  - slot
                  type: object
                type: array
              nodeName:
                description: NodeName is the node the attester answered from.
                type: string
              nonce:
                description: |-
                  Nonce is the same value the run requested — recorded for
                  audit trail.
                type: string
              quote:
                description: |-
                  Quote is the raw attestation evidence (bytes vary by
                  backend). The verifier consumes this; downstream consumers
                  shouldn't try to parse it without the matching backend SDK.
                format: byte
                type: string
              signature:
                description: |-
                  Signature is the quote signature (TPM EK / SNP VLEK / TDX
                  quote signing key). Empty for backends that ship signature
                  inside Quote.
                format: byte
                type: string
              verdict:
                description: Verdict is the verifier's decision.
                enum:
                - verified
                - failed
                - indeterminate
                type: string
              verifierNotes:
                description: |-
                  VerifierNotes carries free-form context (chain check details,
                  missing-device messages on indeterminate verdicts, etc.).
                type: string
            required:
            - backend
            - derivedFromRun
            - nodeName
            - nonce
            - verdict
            type: object
          status:
            description: |-
              ConfidentialAttestationResultStatus carries the canonical "is the
              node currently trusted" bit, derived from Verdict.
            properties:
              trusted:
                description: Trusted is true when Verdict==verified; false otherwise.
                type: boolean
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
