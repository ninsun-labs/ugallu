kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: tenantboundaries.security.ugallu.io
spec:
  group: security.ugallu.io
  names:
    kind: TenantBoundary
    listKind: TenantBoundaryList
    plural: tenantboundaries
    shortNames:
    - tb
    singular: tenantboundary
  scope: Cluster
  versions:
  - additionalPrinterColumns:
    - jsonPath: .status.matchedNamespaces
      name: MatchedNamespaces
      type: string
    - jsonPath: .status.matchedPods
      name: MatchedPods
      type: integer
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          TenantBoundary is the cluster-scoped resource that defines one
          tenant's blast radius for the ugallu-tenant-escape operator.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              TenantBoundarySpec defines the namespaces, hostPath whitelist, and
              SA + namespace allowlists that constitute one tenant's blast radius.
              Multi-instance, cluster-scoped: each TenantBoundary names a tenant;
              cross-CR namespaceSelector overlap is reported via Status and a
              meta-event but never silently merged.
            properties:
              hostPathPolicy:
                description: |-
                  HostPathPolicy declares the host filesystem prefixes this
                  tenant is allowed to mount via Pod hostPath volumes. A Pod
                  in this tenant mounting outside this list AND inside another
                  tenant's allow list fires CrossTenantHostPathOverlap.
                properties:
                  allow:
                    description: |-
                      Allow lists prefix patterns the tenant's pods may mount.
                      Suffix match: "/var/lib/team-a/" matches any path starting
                      with that prefix.
                    items:
                      type: string
                    type: array
                type: object
              namespaceSelector:
                description: |-
                  NamespaceSelector picks the namespaces that belong to this
                  tenant. Empty selector = match-none (defensive default; the
                  admin must explicitly opt namespaces in).
                properties:
                  matchExpressions:
                    description: matchExpressions is a list of label selector requirements.
                      The requirements are ANDed.
                    items:
                      description: |-
                        A label selector requirement is a selector that contains values, a key, and an operator that
                        relates the key and values.
                      properties:
                        key:
                          description: key is the label key that the selector applies
                            to.
                          type: string
                        operator:
                          description: |-
                            operator represents a key's relationship to a set of values.
                            Valid operators are In, NotIn, Exists and DoesNotExist.
                          type: string
                        values:
                          description: |-
                            values is an array of string values. If the operator is In or NotIn,
                            the values array must be non-empty. If the operator is Exists or DoesNotExist,
                            the values array must be empty. This array is replaced during a strategic
                            merge patch.
                          items:
                            type: string
                          type: array
                          x-kubernetes-list-type: atomic
                      required:
                      - key
                      - operator
                      type: object
                    type: array
                    x-kubernetes-list-type: atomic
                  matchLabels:
                    additionalProperties:
                      type: string
                    description: |-
                      matchLabels is a map of {key,value} pairs. A single {key,value} in the matchLabels
                      map is equivalent to an element of matchExpressions, whose key field is "key", the
                      operator is "In", and the values array contains only "value". The requirements are ANDed.
                    type: object
                type: object
                x-kubernetes-map-type: atomic
              serviceAccountAllowlist:
                description: |-
                  ServiceAccountAllowlist lists SA usernames (full
                  "system:serviceaccount:<ns>:<name>" form) that may legitimately
                  cross this tenant's boundary as actors (e.g. cluster-admin
                  controllers operating on tenant resources).
                items:
                  type: string
                type: array
              trustedNamespaces:
                description: |-
                  TrustedNamespaces lists other namespaces that are allowed to
                  be the source of cross-tenant NetworkPolicy ingress without
                  triggering CrossTenantNetworkPolicy (e.g. shared "monitoring"
                  or "ingress" namespaces).
                items:
                  type: string
                type: array
            required:
            - namespaceSelector
            type: object
          status:
            description: TenantBoundaryStatus surfaces operator-side observations.
            properties:
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
                x-kubernetes-list-map-keys:
                - type
                x-kubernetes-list-type: map
              lastReconcileAt:
                description: LastReconcileAt timestamps the most recent successful
                  reconcile.
                format: date-time
                type: string
              matchedNamespaces:
                description: |-
                  MatchedNamespaces is the live list of namespaces matched by
                  Spec.NamespaceSelector at the most recent reconcile.
                items:
                  type: string
                type: array
              matchedPods:
                description: |-
                  MatchedPods is the count of Pods currently running across the
                  matched namespaces. Diagnostic - drift between this and the
                  expected tenant size signals miss-labelled namespaces.
                format: int32
                type: integer
            type: object
        type: object
    served: true
    storage: true
    subresources:
      status: {}
