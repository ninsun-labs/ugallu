---
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  annotations:
    controller-gen.kubebuilder.io/version: v0.20.1
  name: backupverifyruns.security.ugallu.io
spec:
  group: security.ugallu.io
  names:
    kind: BackupVerifyRun
    listKind: BackupVerifyRunList
    plural: backupverifyruns
    shortNames:
    - bvr
    singular: backupverifyrun
  scope: Namespaced
  versions:
  - additionalPrinterColumns:
    - jsonPath: .spec.backend
      name: Backend
      type: string
    - jsonPath: .spec.mode
      name: Mode
      type: string
    - jsonPath: .status.phase
      name: Phase
      type: string
    - jsonPath: .metadata.creationTimestamp
      name: Age
      type: date
    name: v1alpha1
    schema:
      openAPIV3Schema:
        description: |-
          BackupVerifyRun is one verification cycle: download + checksum +
          (optionally) sandbox restore + diff. Cluster admin creates it
          (typically from a CronJob); the operator drives lifecycle and
          writes a BackupVerifyResult in the same namespace.
        properties:
          apiVersion:
            description: |-
              APIVersion defines the versioned schema of this representation of an object.
              Servers should convert recognized schemas to the latest internal value, and
              may reject unrecognized values.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#resources
            type: string
          kind:
            description: |-
              Kind is a string value representing the REST resource this object represents.
              Servers may infer this from the endpoint the client submits requests to.
              Cannot be updated.
              In CamelCase.
              More info: https://git.k8s.io/community/contributors/devel/sig-architecture/api-conventions.md#types-kinds
            type: string
          metadata:
            type: object
          spec:
            description: |-
              BackupVerifyRunSpec is the runtime config the ugallu-backup-verify
              operator reads to drive a verification cycle (design 21 §B —
              Wave 4 §S4).
            properties:
              backend:
                description: |-
                  Backend selects the storage backend. v0.1.0 supports
                  Velero (managed Backup CR) and etcd-snapshot (raw etcd dumps
                  produced by k3s/RKE2/etcd-backup-operator). Restic and
                  S3-raw are out of scope.
                enum:
                - velero
                - etcd-snapshot
                type: string
              backupRef:
                description: BackupRef pins the specific backup the run targets.
                properties:
                  name:
                    description: |-
                      Name of the upstream Backup resource (Velero) OR snapshot file
                      (etcd-snapshot, e.g. "etcd-snapshot-2026-04-29-0030").
                    type: string
                  namespace:
                    description: |-
                      Namespace is the Velero Backup CR namespace. Empty for
                      etcd-snapshot backend.
                    type: string
                  storageLocation:
                    description: |-
                      StorageLocation overrides the BackupStorageLocation when
                      multiple are configured (Velero only).
                    type: string
                required:
                - name
                type: object
              mode:
                default: checksum-only
                description: |-
                  Mode toggles checksum-only vs full-restore. Full-restore
                  requires SandboxNamespace + a non-empty restore policy.
                enum:
                - checksum-only
                - full-restore
                type: string
              sandboxNamespace:
                description: |-
                  SandboxNamespace is the (cluster-local) namespace into which
                  full-restore mode replays the backup. Must NOT be a production
                  namespace — admission policy 14 enforces a name suffix
                  "-bvsandbox" for safety. Required when Mode=full-restore.
                type: string
              timeout:
                default: 15m
                description: |-
                  Timeout caps the total run duration. Bounded server-side at
                  1h to keep verification cycles cheap.
                type: string
            required:
            - backend
            - backupRef
            - mode
            - timeout
            type: object
          status:
            description: BackupVerifyRunStatus tracks lifecycle.
            properties:
              completionTime:
                format: date-time
                type: string
              conditions:
                items:
                  description: Condition contains details for one aspect of the current
                    state of this API Resource.
                  properties:
                    lastTransitionTime:
                      description: |-
                        lastTransitionTime is the last time the condition transitioned from one status to another.
                        This should be when the underlying condition changed.  If that is not known, then using the time when the API field changed is acceptable.
                      format: date-time
                      type: string
                    message:
                      description: |-
                        message is a human readable message indicating details about the transition.
                        This may be an empty string.
                      maxLength: 32768
                      type: string
                    observedGeneration:
                      description: |-
                        observedGeneration represents the .metadata.generation that the condition was set based upon.
                        For instance, if .metadata.generation is currently 12, but the .status.conditions[x].observedGeneration is 9, the condition is out of date
                        with respect to the current state of the instance.
                      format: int64
                      minimum: 0
                      type: integer
                    reason:
                      description: |-
                        reason contains a programmatic identifier indicating the reason for the condition's last transition.
                        Producers of specific condition types may define expected values and meanings for this field,
                        and whether the values are considered a guaranteed API.
                        The value should be a CamelCase string.
                        This field may not be empty.
                      maxLength: 1024
                      minLength: 1
                      pattern: ^[A-Za-z]([A-Za-z0-9_,:]*[A-Za-z0-9_])?$
                      type: string
                    status:
                      description: status of the condition, one of True, False, Unknown.
                      enum:
                      - "True"
                      - "False"
                      - Unknown
                      type: string
                    type:
                      description: type of condition in CamelCase or in foo.example.com/CamelCase.
                      maxLength: 316
                      pattern: ^([a-z0-9]([-a-z0-9]*[a-z0-9])?(\.[a-z0-9]([-a-z0-9]*[a-z0-9])?)*/)?(([A-Za-z0-9][-A-Za-z0-9_.]*)?[A-Za-z0-9])$
                      type: string
                  required:
                  - lastTransitionTime
                  - message
                  - reason
                  - status
                  - type
                  type: object
                type: array
              phase:
                enum:
                - Pending
                - Running
                - Succeeded
                - Failed
                type: string
              resultRef:
                description: |-
                  ResultRef points to the BackupVerifyResult the run produced.
                  Empty until Phase=Succeeded.
                properties:
                  name:
                    type: string
                required:
                - name
                type: object
              startTime:
                format: date-time
                type: string
            type: object
        required:
        - spec
        type: object
    served: true
    storage: true
    subresources:
      status: {}
