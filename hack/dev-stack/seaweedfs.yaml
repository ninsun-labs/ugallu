# SeaweedFS all-in-one (master + volume + filer + s3) for kind smoke
# tests. Provides an S3-compatible WORM target with Object Lock support.
#
# NOT for production: ephemeral storage, static creds in ConfigMap.
apiVersion: v1
kind: Namespace
metadata:
  name: ugallu-evidence
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: seaweedfs-s3-config
  namespace: ugallu-evidence
data:
  config.json: |
    {
      "identities": [
        {
          "name": "ugallu",
          "credentials": [
            {"accessKey": "ugallu-access", "secretKey": "ugallu-secret"}
          ],
          "actions": ["Read", "Write", "List", "Tagging", "Admin"]
        }
      ]
    }
---
apiVersion: v1
kind: Service
metadata:
  name: seaweedfs
  namespace: ugallu-evidence
spec:
  type: ClusterIP
  ports:
    - name: s3
      port: 8333
      targetPort: 8333
    - name: filer
      port: 8888
      targetPort: 8888
    - name: master
      port: 9333
      targetPort: 9333
  selector:
    app: seaweedfs
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: seaweedfs
  namespace: ugallu-evidence
spec:
  replicas: 1
  selector:
    matchLabels:
      app: seaweedfs
  template:
    metadata:
      labels:
        app: seaweedfs
    spec:
      containers:
        - name: seaweedfs
          image: chrislusf/seaweedfs:3.97
          args:
            - server
            - -master
            - -volume
            - -filer
            - -s3
            - -s3.config=/etc/s3conf/config.json
            - -dir=/data
          ports:
            - name: s3
              containerPort: 8333
            - name: filer
              containerPort: 8888
            - name: master
              containerPort: 9333
            - name: volume
              containerPort: 8080
          readinessProbe:
            tcpSocket:
              port: 8333
            periodSeconds: 5
            failureThreshold: 30
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: 1000m
              memory: 1Gi
          volumeMounts:
            - name: data
              mountPath: /data
            - name: s3conf
              mountPath: /etc/s3conf
      volumes:
        - name: data
          emptyDir: {}
        - name: s3conf
          configMap:
            name: seaweedfs-s3-config
---
# aws-cli pod with credentials baked in, used by up.sh to create the
# Object-Lock-enabled bucket and (interactively) to inspect objects.
apiVersion: v1
kind: Pod
metadata:
  name: aws-cli
  namespace: ugallu-evidence
spec:
  restartPolicy: Always
  containers:
    - name: awscli
      image: amazon/aws-cli:2.27.50
      command: ["sleep", "infinity"]
      env:
        - name: AWS_ACCESS_KEY_ID
          value: ugallu-access
        - name: AWS_SECRET_ACCESS_KEY
          value: ugallu-secret
        - name: AWS_DEFAULT_REGION
          value: us-east-1
      resources:
        requests:
          cpu: 10m
          memory: 64Mi
        limits:
          cpu: 200m
          memory: 256Mi
