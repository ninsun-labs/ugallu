# Umbrella chart values for ugallu. See subcharts for component-specific values.
#
# Two namespaces are provisioned (designs 14 and 18):
#   - ugallu-system               (PSA restricted)
#   - ugallu-system-privileged    (PSA privileged: resolver, forensics, etc.)
#
# Hardening flag (design 14): when strict, install fails preflight unless all
# hardening prerequisites are met (NetworkPolicy, sigstore-policy-controller,
# SPIRE, NTP).
hardening:
  strict: false

# Globals propagated to all subcharts that need them.
global:
  namespaces:
    system: ugallu-system
    privileged: ugallu-system-privileged

# namespaces subchart (Wave -2): provisions ugallu-system + ugallu-system-privileged.
namespaces:
  enabled: true

# rbac subchart (Wave -2): ServiceAccounts + ClusterRole/Role bindings (design 13).
rbac:
  enabled: true
  resolver: { enabled: true }
  attestor: { enabled: true }
  ttl: { enabled: true }
  auditDetection: { enabled: true }
  forensics: { enabled: true }
  gitopsResponder: { enabled: true }
  backpressure: { enabled: true }
  ciliumNetworkPolicies: true

# admission-policies subchart (Wave -1): CEL ValidatingAdmissionPolicy (design 15).
admission-policies:
  enabled: true

  # Service Accounts allowed to set Status.Acknowledged=true on SE/ER
  # (admission Policy 4). Empty by default: no one can ack until an admin
  # adds an authorized SA explicitly. Format: full SA username,
  # e.g. "system:serviceaccount:ugallu-system:my-ack-bot".
  ackAuthorizedSAs: []

  # Namespace where ugallu-ttl runs. Used by admission Policy 3 to scope the
  # annotation-only patch privilege.
  ttlControllerNamespace: ugallu-system
  ttlControllerSAName: ugallu-ttl

# Wave 1 SDK runtime singletons. Subcharts ship with PLACEHOLDER images
# (busybox sleep infinity) until the real binaries are implemented.
resolver:
  enabled: true
attestor:
  enabled: true
ttl:
  enabled: true
gitops-responder:
  enabled: true
backpressure:
  enabled: true

# audit-detection subchart (Wave 2 §A): apiserver audit log → Sigma rule
# engine → SecurityEvent. Default mode is webhook (apiserver pushes
# batched events over HTTPS); flip source.mode to "file" for the
# DaemonSet that tails the kubelet/apiserver audit-log file.
audit-detection:
  enabled: true

# forensics subchart (Wave 2 §B): SE-triggered IR-as-code pipeline
# (pod freeze + filesystem snapshot + WORM evidence). Runs leader-
# elected in ugallu-system-privileged.
forensics:
  enabled: true

# monitoring subchart (Wave 2 §IV): PrometheusRule + Grafana
# dashboards covering audit-detection / forensics / emitter SDK.
# Disable when the cluster has no kube-prometheus-stack;
# the manifests still apply but PrometheusRule has no consumer.
monitoring:
  enabled: true

# webhook-auditor subchart (Wave 3 §W): risk-scores admission webhook
# configurations and emits Detection-class SecurityEvents when a webhook
# crosses the configured threshold. Scaffold ships placeholder=true
# (busybox sleep) until the real binary lands.
webhook-auditor:
  enabled: true

# dns-detect subchart (Wave 3 §D): consumes DNS query stream from
# coredns-ugallu plugin (primary) or Tetragon kprobe (fallback) and
# emits SecurityEvents when one of 5 detectors fires (exfiltration,
# tunneling, blocklist, young-domain, anomalous port).
dns-detect:
  enabled: true

# tenant-escape subchart (Wave 3 §T): consumes the audit-detection
# event bus + Tetragon network namespace events to detect
# multi-tenancy isolation breaches (cross-tenant Secret access,
# hostPath overlap, NetworkPolicy ingress, exec).
tenant-escape:
  enabled: true

# honeypot subchart (Wave 3 §H): materialises declared decoy K8s
# resources (Secret/ServiceAccount, ConfigMap/Namespace post-Wave-4)
# from HoneypotConfig CRs and consumes the audit-detection event
# bus to fire HoneypotTriggered SEs the moment any actor touches
# one of those decoys. Tripwire model — there is no legitimate
# reason to read a decoy.
honeypot:
  enabled: true

# tetragon-bridge subchart (Wave 4 §S2): typed gRPC fan-out from
# Tetragon FineGuidanceSensors GetEvents. Operators (dns-detect
# Tetragon-fallback, tenant-escape exec source, seccomp-gen training
# capture) subscribe to this single bridge instead of dialling
# Tetragon directly. Default source.mode=synthetic so the chart
# applies cleanly on lab clusters without Tetragon installed; flip
# to "tetragon" once a Tetragon DaemonSet is reachable.
tetragon-bridge:
  enabled: true
  source:
    mode: synthetic

# seccomp-gen subchart (Wave 4 §S3): consumes the tetragon-bridge
# StreamFileOpen and produces a seccomp.json from the captured
# syscall surface. SeccompTrainingRun + SeccompTrainingProfile CRDs
# in the security.ugallu.io/v1alpha1 group.
seccomp-gen:
  enabled: true

# backup-verify subchart (Wave 4 §S4): verifies Velero / etcd-snapshot
# backups via checksum + (optional) sandbox restore. Out of scope:
# Restic and S3-raw — verifying raw blobs doesn't compose with K8s
# object semantics.
backup-verify:
  enabled: true
