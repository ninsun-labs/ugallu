global:
  namespaces:
    system: ugallu-system

# Cluster identity stamped on every emitted SecurityEvent.
clusterIdentity:
  clusterID: ""
  clusterName: ""

# Default blocklist ConfigMap shipped with the chart. The dns-detect
# operator watches this ConfigMap (and any extra ones referenced in
# DNSDetectConfig.spec.detectors.blocklist.configMaps) for the FQDN
# patterns. The default namespace is provisioned by the chart so the
# operator's RBAC can be tightly scoped.
blocklist:
  shipDefault: true
  namespace: ugallu-dns-blocklists

# Singleton DNSDetectConfig CR shipped with the chart.
dnsDetectConfig:
  enabled: true
  source:
    primary: coredns_plugin
    fallback: tetragon_kprobe
    plugin:
      grpcEndpoint: "coredns.kube-system.svc.cluster.local:8443"
      tokenSecret:
        name: ugallu-coredns-grpc-token
        key: token
  detectors:
    exfiltration:
      enabled: true
      minLabelLen: 60
      minEntropy: "4.0"
      windowSize: 64
      consecutiveTriggers: 3
    tunneling:
      enabled: true
      ratelimitPerPod: 1m
    blocklist:
      enabled: true
      configMaps:
        - { namespace: ugallu-dns-blocklists, name: default }
    youngDomain:
      enabled: true
      thresholdDays: 30
      rdapEndpoint: "https://rdap.org/"
      rateLimit: "100/h"
    anomalousPort:
      enabled: true

# Placeholder until the real binary lands at
# ghcr.io/ninsun-labs/ugallu/dns-detect:<chart-tag>.
placeholder: true
image:
  repository: ghcr.io/ninsun-labs/ugallu/dns-detect
  tag: "v0.1.0-alpha.2"
  pullPolicy: IfNotPresent

command: ["/bin/sleep", "infinity"]
args: []

# DaemonSet: one replica per node.
resources:
  requests:
    cpu: "50m"
    memory: "128Mi"
  limits:
    cpu: "500m"
    memory: "512Mi"

metricsPort: 9090
healthProbePort: 8081

nodeSelector: {}
tolerations: []
affinity: {}
