apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "confidentialattestation.serviceAccount" . }}
  namespace: {{ include "confidentialattestation.namespace" . }}
  labels:
    {{- include "confidentialattestation.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ugallu-confidential-attestation
  labels:
    {{- include "confidentialattestation.labels" . | nindent 4 }}
rules:
  - apiGroups: ["security.ugallu.io"]
    resources: ["confidentialattestationruns", "confidentialattestationruns/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["confidentialattestationresults", "confidentialattestationresults/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ugallu-confidential-attestation
  labels:
    {{- include "confidentialattestation.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ugallu-confidential-attestation
subjects:
  - kind: ServiceAccount
    name: {{ include "confidentialattestation.serviceAccount" . }}
    namespace: {{ include "confidentialattestation.namespace" . }}
