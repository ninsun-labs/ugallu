global:
  namespaces:
    system: ugallu-system

# Source mode picks the audit-event backend:
#   - webhook: HTTPS POST endpoint (apiserver audit-webhook backend).
#              Renders as a singleton Deployment + Service.
#   - file:    tail kubelet/apiserver audit-log file.
#              Renders as a DaemonSet that hostPath-mounts the audit log.
source:
  mode: webhook

  webhook:
    listenAddr: ":8443"
    path: "/v1/audit"
    # Bearer token shared secret. Stored in a Secret named below; the
    # deployment exposes it as env AUDIT_WEBHOOK_TOKEN. When sharedSecretRef
    # is empty, the operator runs in mTLS-only mode (clientCASecretRef
    # required).
    sharedSecretRef:
      secretName: ugallu-audit-webhook-token
      key: token
    # TLS material:
    #   tlsSecretRef points at a tls.crt/tls.key Secret.
    #   clientCASecretRef points at an mTLS bundle (optional).
    tlsSecretRef:
      secretName: ugallu-audit-webhook-tls
    clientCASecretRef:
      secretName: ""

  file:
    # Path inside the pod (the host audit log is bind-mounted at this path).
    path: /host/audit/audit.log
    # Host path that contains the audit log file. The DaemonSet mounts
    # this read-only.
    hostPath: /var/log/audit

# Cluster identity stamped on every emitted SecurityEvent.
clusterIdentity:
  clusterID: ""
  clusterName: ""

# Placeholder until the real binary lands at ghcr.io/ninsun-labs/ugallu/audit-detection.
placeholder: true
image:
  repository: busybox
  tag: "1.37"
  pullPolicy: IfNotPresent

# When placeholder=true the container runs sleep so the pod stays alive
# for kubectl/Argo health checks. Replace with the real argv when the
# binary image is published.
command: ["/bin/sleep", "infinity"]
args: []

replicas: 1

resources:
  requests:
    cpu: "10m"
    memory: "64Mi"
  limits:
    cpu: "200m"
    memory: "256Mi"

metricsPort: 9090
healthProbePort: 8081

# audit-detection event bus. When eventBus.enabled=true
# the operator exposes the AuditStream gRPC server at busPort and
# binds the matching Service. The chart ships an
# AuditDetectionConfig CR mirroring these values; flipping
# eventBus.enabled here MUST be matched by an AuditDetectionConfig
# update before subscribers can connect.
busPort: 8444

eventBus:
  enabled: false
  consumers:
    # tenant-escape consumer: pre-declared so flipping
    # eventBus.enabled=true is enough for tenant-escape to connect.
    - name: tenant-escape
      filter:
        objectRefHasNamespace: true
        verbAllowlist: ["get", "list", "watch", "create", "update", "patch"]
      maxEventsPerSec: 1000
    # honeypot consumer. EmptyResource filter so
    # cluster-scoped Secret reads via list-without-namespace still
    # reach the detector; verb allowlist matches the tripwire
    # surface (any verb on a decoy is interesting).
    - name: honeypot
      filter:
        verbAllowlist: ["get", "list", "watch", "create", "update", "patch", "delete"]
      maxEventsPerSec: 500

# Bearer token Secret for the bus (subscribers carry it as
# "Authorization: Bearer ..."). Empty secretName disables auth
# (lab-only).
busTokenSecret:
  secretName: ugallu-audit-bus-token
  key: token

nodeSelector: {}
tolerations: []
affinity: {}
