apiVersion: v1
kind: Service
metadata:
  name: ugallu-forensics-metrics
  namespace: {{ include "forensics.namespace" . }}
  labels:
    {{- include "forensics.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "forensics.selectorLabels" . | nindent 4 }}
  ports:
    - name: metrics
      port: {{ .Values.metricsPort }}
      targetPort: metrics
      protocol: TCP
