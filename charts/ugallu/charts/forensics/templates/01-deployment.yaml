apiVersion: apps/v1
kind: Deployment
metadata:
  name: ugallu-forensics
  namespace: {{ include "forensics.namespace" . }}
  labels:
    {{- include "forensics.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "forensics.selectorLabels" . | nindent 6 }}
  strategy:
    # RollingUpdate keeps a leader continuously available; the
    # leader-election lease handles which replica is actively
    # reconciling at any given moment.
    type: RollingUpdate
  template:
    metadata:
      labels:
        {{- include "forensics.labels" . | nindent 8 }}
      annotations:
        ugallu.io/scaffold: {{ .Values.placeholder | quote }}
    spec:
      serviceAccountName: ugallu-forensics
      priorityClassName: system-cluster-critical
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: forensics
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.command }}
          args: {{ include "forensics.args" . }}
          {{- if not .Values.placeholder }}
          env:
            - name: WORM_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.worm.secret.name }}
                  key: access-key
            - name: WORM_SECRET_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.worm.secret.name }}
                  key: secret-key
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
