{{- /*
Policy 11 - TenantBoundary spec invariants.

Cross-tenant detection only works if every TenantBoundary CR opts
namespaces in explicitly: an empty / missing NamespaceSelector
silently turns into match-all and would mask real boundary breaches.

The policy enforces three spec invariants at admit time:
  - spec.namespaceSelector MUST be set, with at least one
    matchLabels entry OR one matchExpressions entry. Empty
    selector = match-none (the operator's defensive default),
    but admins shipping an empty CR almost always meant
    match-all - fail loudly here.
  - spec.hostPathPolicy.allow[*] entries MUST start with "/" so
    HasPrefix lookups in the operator's BoundarySet match the
    canonical absolute-path form.
  - spec.serviceAccountAllowlist[*] entries MUST follow
    "system:serviceaccount:<ns>:<name>".

Cross-CR overlap detection (the same namespace claimed by two
TenantBoundary CRs) is necessarily a runtime check - VAP CEL has
no list-other-resources primitive. The operator surfaces overlap
via the TenantBoundaryOverlap meta-event published by the
reconciler.
*/ -}}
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicy
metadata:
  name: ugallu.tenant-boundary-spec
  labels:
    {{- include "admission-policies.labels" . | nindent 4 }}
spec:
  failurePolicy: Fail
  matchConstraints:
    resourceRules:
      - apiGroups:   ["security.ugallu.io"]
        apiVersions: ["v1alpha1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["tenantboundaries"]
  validations:
    - expression: |
        has(object.spec.namespaceSelector) &&
        (
          (has(object.spec.namespaceSelector.matchLabels) && size(object.spec.namespaceSelector.matchLabels) > 0) ||
          (has(object.spec.namespaceSelector.matchExpressions) && size(object.spec.namespaceSelector.matchExpressions) > 0)
        )
      message: "TenantBoundary.spec.namespaceSelector must set matchLabels or matchExpressions; empty selector would mask boundary breaches."
      reason: Invalid
    - expression: |
        !has(object.spec.hostPathPolicy) ||
        !has(object.spec.hostPathPolicy.allow) ||
        object.spec.hostPathPolicy.allow.all(p, p.startsWith('/'))
      message: "TenantBoundary.spec.hostPathPolicy.allow entries must be absolute paths (start with '/')."
      reason: Invalid
    - expression: |
        !has(object.spec.serviceAccountAllowlist) ||
        object.spec.serviceAccountAllowlist.all(u, u.startsWith('system:serviceaccount:'))
      message: "TenantBoundary.spec.serviceAccountAllowlist entries must be of the form 'system:serviceaccount:<ns>:<name>'."
      reason: Invalid
---
apiVersion: admissionregistration.k8s.io/v1
kind: ValidatingAdmissionPolicyBinding
metadata:
  name: ugallu.tenant-boundary-spec
  labels:
    {{- include "admission-policies.labels" . | nindent 4 }}
spec:
  policyName: ugallu.tenant-boundary-spec
  validationActions: [Deny]
  matchResources:
    resourceRules:
      - apiGroups:   ["security.ugallu.io"]
        apiVersions: ["v1alpha1"]
        operations:  ["CREATE", "UPDATE"]
        resources:   ["tenantboundaries"]
