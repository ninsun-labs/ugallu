# admission-policies subchart defaults. Override via the umbrella values
# (key `admission-policies` at the umbrella level).
enabled: true

# SAs allowed to set Status.Acknowledged=true on SE/ER (Policy 4).
ackAuthorizedSAs: []

# Where ugallu-ttl runs (Policy 3 scope).
ttlControllerNamespace: ugallu-system
ttlControllerSAName: ugallu-ttl

# SAs allowed to set / remove the `ugallu.io/frozen` label on Pods
# (Policy 7). Default targets the forensics operator SA; override to
# add break-glass admins if your operations need a fallback.
frozenLabelAuthorizedSAs:
  - system:serviceaccount:ugallu-system-privileged:ugallu-forensics

# SAs allowed to set the `ugallu.io/incident-acknowledged=true`
# annotation on Forensic-class SEs (Policy 8). Empty default = no
# one can manually ack until an admin populates the list. The
# pattern mirrors Policy 4 + ackAuthorizedSAs.
forensicsAckAuthorizedSAs: []
