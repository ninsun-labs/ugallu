---
apiVersion: v1
kind: Service
metadata:
  name: ugallu-ui
  namespace: {{ include "ugalluui.namespace" . }}
  labels:
    {{- include "ugalluui.labels" . | nindent 4 }}
spec:
  type: ClusterIP
  selector:
    {{- include "ugalluui.selectorLabels" . | nindent 4 }}
  ports:
    - name: web
      port: {{ .Values.service.port }}
      targetPort: web
      protocol: TCP
