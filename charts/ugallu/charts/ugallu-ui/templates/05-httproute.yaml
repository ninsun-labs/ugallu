{{- if eq .Values.routing.kind "gateway" }}
---
# HTTPRoute attached to an existing Gateway. The Gateway's TLS
# listener is provisioned by the cluster operator (cert-manager
# gateway-shim usually owns the cert) - the chart only owns the
# route binding.
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: ugallu-ui
  namespace: {{ include "ugalluui.namespace" . }}
  labels:
    {{- include "ugalluui.labels" . | nindent 4 }}
spec:
  parentRefs:
    - name: {{ .Values.gateway.parentRef.name | quote }}
      {{- with .Values.gateway.parentRef.namespace }}
      namespace: {{ . | quote }}
      {{- end }}
      {{- with .Values.gateway.parentRef.sectionName }}
      sectionName: {{ . | quote }}
      {{- end }}
  hostnames:
    - {{ .Values.gateway.host | quote }}
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: ugallu-ui
          port: {{ .Values.service.port }}
          weight: 1
{{- end }}
