{{- if .Values.dashboards.enabled }}
{{- range $name, $contents := .Files.Glob "dashboards/*.json" }}
---
apiVersion: v1
kind: ConfigMap
metadata:
  # Strip the "dashboards/" prefix + the ".json" suffix to land
  # the configmap as ugallu-dashboard-<basename>.
  name: ugallu-dashboard-{{ $name | base | trimSuffix ".json" }}
  namespace: {{ include "monitoring.namespace" $ }}
  labels:
    {{- include "monitoring.labels" $ | nindent 4 }}
    {{- with $.Values.dashboards.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with $.Values.dashboards.folder }}
  annotations:
    grafana_folder: {{ . | quote }}
  {{- end }}
data:
  {{ $name | base }}: |-
{{ $contents | toString | indent 4 }}
{{- end }}
{{- end }}
