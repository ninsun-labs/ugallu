apiVersion: apps/v1
kind: Deployment
metadata:
  name: ugallu-backup-verify
  namespace: {{ include "backupverify.namespace" . }}
  labels:
    {{- include "backupverify.labels" . | nindent 4 }}
spec:
  replicas: 1
  selector:
    matchLabels:
      {{- include "backupverify.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "backupverify.labels" . | nindent 8 }}
      annotations:
        ugallu.io/scaffold: {{ .Values.placeholder | quote }}
    spec:
      serviceAccountName: {{ include "backupverify.serviceAccount" . }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: backup-verify
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          command: {{ toJson .Values.command }}
          args: {{ toJson .Values.args }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
              protocol: TCP
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            - name: etcd-snapshots
              mountPath: {{ .Values.etcdSnapshot.hostPath }}
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: etcd-snapshots
          hostPath:
            path: {{ .Values.etcdSnapshot.hostPath }}
            type: DirectoryOrCreate
