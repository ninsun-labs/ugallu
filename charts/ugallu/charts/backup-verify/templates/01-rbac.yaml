apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "backupverify.serviceAccount" . }}
  namespace: {{ include "backupverify.namespace" . }}
  labels:
    {{- include "backupverify.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ugallu-backup-verify
  labels:
    {{- include "backupverify.labels" . | nindent 4 }}
rules:
  - apiGroups: ["security.ugallu.io"]
    resources: ["backupverifyruns", "backupverifyruns/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["backupverifyresults", "backupverifyresults/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents"]
    verbs: ["create"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ugallu-backup-verify
  labels:
    {{- include "backupverify.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ugallu-backup-verify
subjects:
  - kind: ServiceAccount
    name: {{ include "backupverify.serviceAccount" . }}
    namespace: {{ include "backupverify.namespace" . }}
