apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "backupverify.serviceAccount" . }}
  namespace: {{ include "backupverify.namespace" . }}
  labels:
    {{- include "backupverify.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ugallu-backup-verify
  labels:
    {{- include "backupverify.labels" . | nindent 4 }}
rules:
  - apiGroups: ["security.ugallu.io"]
    resources: ["backupverifyruns", "backupverifyruns/status"]
    verbs: ["get", "list", "watch", "update", "patch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["backupverifyresults", "backupverifyresults/status"]
    verbs: ["get", "list", "watch", "create", "update", "patch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
  # Velero backend reads Backup + BackupStorageLocation CRs to
  # surface phase / errors / BSL availability as findings. Watch is
  # not strictly needed (single-shot Get per run) but stays in line
  # with the controller-runtime client cache convention.
  - apiGroups: ["velero.io"]
    resources: ["backups", "backupstoragelocations"]
    verbs: ["get", "list", "watch"]
  # Full-restore mode creates a Restore CR per BackupVerifyRun and
  # tears it down once the run reaches a terminal phase.
  - apiGroups: ["velero.io"]
    resources: ["restores"]
    verbs: ["get", "list", "watch", "create", "delete"]
  # The sandbox diff enumerates Pod/CM/Secret/SA inside the run's
  # SandboxNamespace; cluster-wide read is acceptable because the
  # diff is read-only and helpful when ops grep across runs.
  - apiGroups: [""]
    resources: ["pods", "configmaps", "secrets", "serviceaccounts"]
    verbs: ["get", "list", "watch"]
  # Sandbox cleanup deletes the namespace at the end of the run.
  - apiGroups: [""]
    resources: ["namespaces"]
    verbs: ["get", "list", "watch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ugallu-backup-verify
  labels:
    {{- include "backupverify.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ugallu-backup-verify
subjects:
  - kind: ServiceAccount
    name: {{ include "backupverify.serviceAccount" . }}
    namespace: {{ include "backupverify.namespace" . }}
