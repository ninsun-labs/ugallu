{{- if .Values.gitopsResponder.enabled }}
{{- /*
ugallu-gitops-responder: Deployment singleton. Watches EventResponse
CRs whose action.type=GitOpsChange and dispatches them through a
configured git provider (real PRs land in Sprint 4).
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ugallu-gitops-responder
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ugallu-gitops-responder
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  # Watch + status-update EventResponse for the GitOpsChange action.
  - apiGroups: ["security.ugallu.io"]
    resources: ["eventresponses"]
    verbs: ["get", "list", "watch", "patch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["eventresponses/status"]
    verbs: ["update", "patch"]

  # Read parent SecurityEvents so we can resolve subject metadata for
  # routing decisions and PR body composition.
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents"]
    verbs: ["get", "list", "watch"]

  # Read own config.
  - apiGroups: ["security.ugallu.io"]
    resources: ["gitopsresponderconfigs"]
    verbs: ["get", "list", "watch"]

  # Read git provider credentials Secrets in our namespace.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]

  # Leader election emits Events on the lease object.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ugallu-gitops-responder
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ugallu-gitops-responder
subjects:
  - kind: ServiceAccount
    name: ugallu-gitops-responder
    namespace: {{ include "rbac.ns.system" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ugallu-gitops-responder-leader
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["ugallu-gitops-responder-leader"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ugallu-gitops-responder-leader
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ugallu-gitops-responder-leader
subjects:
  - kind: ServiceAccount
    name: ugallu-gitops-responder
    namespace: {{ include "rbac.ns.system" . }}
{{- end }}
