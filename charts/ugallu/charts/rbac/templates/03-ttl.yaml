{{- if .Values.ttl.enabled }}
{{- /*
ugallu-ttl: Deployment singleton. GC at TTL expiry, attestor watchdog.
PATCH on SE/ER/AB is gated by admission policy 3 to /metadata/annotations
only (postpone, force, frozen). DELETE happens at TTL expiry post-archive.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ugallu-ttl
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ugallu-ttl
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  # GC + annotation patches on the 3 backbone CRDs.
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents", "eventresponses", "attestationbundles"]
    verbs: ["get", "list", "watch", "delete", "patch"]

  # Read own config.
  - apiGroups: ["security.ugallu.io"]
    resources: ["ttlconfigs"]
    verbs: ["get", "list", "watch"]

  # Emit telemetry SE (CRArchived, CRArchivePostponed, AttestorUnavailable, ...).
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents"]
    verbs: ["create"]

  # Attestor watchdog (T13): watch ugallu pods to detect stale heartbeat.
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ugallu-ttl
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ugallu-ttl
subjects:
  - kind: ServiceAccount
    name: ugallu-ttl
    namespace: {{ include "rbac.ns.system" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ugallu-ttl-leader
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["ugallu-ttl-leader"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ugallu-ttl-leader
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ugallu-ttl-leader
subjects:
  - kind: ServiceAccount
    name: ugallu-ttl
    namespace: {{ include "rbac.ns.system" . }}
{{- end }}
