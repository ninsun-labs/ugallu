{{- if .Values.honeypot.enabled }}
{{- /*
ugallu-honeypot RBAC.

Singleton Deployment in ugallu-system with leader-elect.
Cluster-wide reads back the detector's audit-bus event evaluation
plus write rights to materialise decoy resources via the deployer.
Wave 3 Sprint 5 ships scaffolding RBAC: SA + ClusterRole for SE
emit + own CRD read+status. Real wiring (cluster-wide CRUD on
Secret/ServiceAccount + cluster-wide read on the rest) extends in
Sprint 5 commit 5 (chart real).
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ugallu-honeypot
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ugallu-honeypot
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents"]
    verbs: ["create"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["honeypotconfigs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["honeypotconfigs/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ugallu-honeypot
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ugallu-honeypot
subjects:
  - kind: ServiceAccount
    name: ugallu-honeypot
    namespace: {{ include "rbac.ns.system" . }}
{{- end }}
