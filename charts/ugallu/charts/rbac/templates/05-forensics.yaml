{{- if .Values.forensics.enabled }}
{{- /*
ugallu-forensics RBAC.

The forensics operator runs leader-elected in the privileged
namespace. Its mandate:

  - watch SecurityEvents cluster-wide and start IR pipelines
    against the suspect Pod;
  - apply (Cilium)NetworkPolicy to isolate the suspect (Cilium
    preferred when present, core v1 fallback);
  - patch the suspect Pod with `ugallu.io/frozen` and inject an
    ephemeral container that runs the forensics-snapshot binary;
  - mirror the WORM credentials Secret into the suspect's
    namespace so the ephemeral container's secretKeyRef resolves;
  - emit Forensic-class SecurityEvents (PodFrozen,
    IncidentCaptureCompleted, IncidentCaptureFailed,
    PodUnfrozen).

Pods/ephemeralcontainers requires its own RBAC entry - the
subresource is gated separately from pods/update.

The frozen-label patch is gated by admission policy 7 (only this
SA can write `ugallu.io/frozen`).
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ugallu-forensics
  namespace: {{ include "rbac.ns.privileged" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ugallu-forensics
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  # Predicate input: SecurityEvent + ForensicsConfig + Forensic SE
  # acknowledge annotation. Patch on SE for the unfreeze-applied
  # marker; create for the lifecycle SEs (PodFrozen / completed /
  # failed / PodUnfrozen) is supplied by the emitter SDK.
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents/status"]
    verbs: ["update", "patch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["forensicsconfigs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["forensicsconfigs/status"]
    verbs: ["update", "patch"]

  # Suspect Pod metadata + ephemeral container injection +
  # snapshot log scrape.
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]
  - apiGroups: [""]
    resources: ["pods"]
    verbs: ["patch"]
  - apiGroups: [""]
    resources: ["pods/ephemeralcontainers"]
    verbs: ["update", "patch"]

  # WORM credentials mirror: read the master Secret, create a copy
  # in the suspect Pod's namespace.
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "create"]

  # Pod isolation: core v1 NetworkPolicy fallback always; Cilium
  # CNP when the chart's `ciliumNetworkPolicies` flag is on.
  - apiGroups: ["networking.k8s.io"]
    resources: ["networkpolicies"]
    verbs: ["get", "list", "create", "delete"]
  {{- if .Values.ciliumNetworkPolicies }}
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "list", "create", "delete"]
  {{- end }}

  # EventResponse (future IR-as-code per-step audit trail). Sprint 2
  # MVP inlines evidence in SE signals, but the create permission is
  # granted now so Sprint 3's per-step ER chain doesn't require an
  # RBAC bump.
  - apiGroups: ["security.ugallu.io"]
    resources: ["eventresponses"]
    verbs: ["get", "list", "watch", "create", "patch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["eventresponses/status"]
    verbs: ["update", "patch"]
  # client-go's leader-election event broadcaster posts a v1.Event
  # on lease acquisition. Without this rule the operator logs a
  # "events is forbidden" warning at boot - cosmetic but noisy.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ugallu-forensics
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ugallu-forensics
subjects:
  - kind: ServiceAccount
    name: ugallu-forensics
    namespace: {{ include "rbac.ns.privileged" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ugallu-forensics-leader
  namespace: {{ include "rbac.ns.privileged" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["ugallu-forensics-leader"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ugallu-forensics-leader
  namespace: {{ include "rbac.ns.privileged" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ugallu-forensics-leader
subjects:
  - kind: ServiceAccount
    name: ugallu-forensics
    namespace: {{ include "rbac.ns.privileged" . }}
{{- end }}
