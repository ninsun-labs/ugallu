{{- if .Values.forensics.enabled }}
{{- /*
ugallu-forensics: Deployment that orchestrates IncidentResponse workflows.
Elevated privileges: pods/exec, pods/ephemeralcontainers, optionally
CiliumNetworkPolicy create. Lives in the privileged namespace; image
attestation is enforced (design 14 hardening checklist).
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ugallu-forensics
  namespace: {{ include "rbac.ns.privileged" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ugallu-forensics
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  # Emit SE/ER (no read on others).
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents", "eventresponses"]
    verbs: ["create"]

  # /status subresource on own EventResponses (workflow steps).
  - apiGroups: ["security.ugallu.io"]
    resources: ["eventresponses/status"]
    verbs: ["update", "patch"]

  # IncidentResponse is forensics' own CRD (operator-specific). Full CRUD.
  - apiGroups: ["security.ugallu.io"]
    resources: ["incidentresponses"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["incidentresponses/status"]
    verbs: ["update", "patch"]

  # Pod read in all namespaces (snapshot fs/mem of subject).
  - apiGroups: [""]
    resources: ["pods", "pods/log"]
    verbs: ["get", "list", "watch"]

  # Pod ephemeral container insert (debug container snapshot).
  - apiGroups: [""]
    resources: ["pods/ephemeralcontainers"]
    verbs: ["update", "patch"]

  # Pod exec (live snapshot tools).
  - apiGroups: [""]
    resources: ["pods/exec"]
    verbs: ["create"]

  {{- if .Values.ciliumNetworkPolicies }}
  # CiliumNetworkPolicy for PodFreeze action (design 04 GitOpsChange).
  - apiGroups: ["cilium.io"]
    resources: ["ciliumnetworkpolicies"]
    verbs: ["get", "list", "create", "delete"]
  {{- end }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ugallu-forensics
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ugallu-forensics
subjects:
  - kind: ServiceAccount
    name: ugallu-forensics
    namespace: {{ include "rbac.ns.privileged" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ugallu-forensics-leader
  namespace: {{ include "rbac.ns.privileged" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["ugallu-forensics-leader"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ugallu-forensics-leader
  namespace: {{ include "rbac.ns.privileged" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ugallu-forensics-leader
subjects:
  - kind: ServiceAccount
    name: ugallu-forensics
    namespace: {{ include "rbac.ns.privileged" . }}
{{- end }}
