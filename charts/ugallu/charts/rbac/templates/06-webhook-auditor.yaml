{{- if .Values.webhookAuditor.enabled }}
{{- /*
ugallu-webhook-auditor RBAC.

Singleton Deployment in ugallu-system (PSA restricted). Watches the
admission webhook configurations (cluster-scoped) and emits SE on
threshold cross.

Secret access (Wave 3 Phase 2): one Role + RoleBinding per namespace
listed in .Values.webhookAuditor.trustedCASources, granting only
get,list,watch on Secrets in that namespace. Scope is intentionally
narrow — the operator follows cert-manager-style indirect caBundle
references (annotation cert-manager.io/inject-ca-from-secret) and
needs to read the referenced Secret's ca.crt / tls.crt / ca.pem keys.
The CABundleResolver enforces the same allowlist as defense-in-depth.
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ugallu-webhook-auditor
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ugallu-webhook-auditor
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  # Watch admission webhook configurations (the workload).
  - apiGroups: ["admissionregistration.k8s.io"]
    resources: ["mutatingwebhookconfigurations", "validatingwebhookconfigurations"]
    verbs: ["get", "list", "watch"]
  # Read CRDs to map subject kinds (defense-in-depth, no write).
  - apiGroups: ["apiextensions.k8s.io"]
    resources: ["customresourcedefinitions"]
    verbs: ["get", "list", "watch"]
  # Emit SecurityEvent only (no read on existing CR).
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents"]
    verbs: ["create"]
  # Read the operator's own config CR.
  - apiGroups: ["security.ugallu.io"]
    resources: ["webhookauditorconfigs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["webhookauditorconfigs/status"]
    verbs: ["update", "patch"]
  # client-go's leader-election event broadcaster posts a v1.Event
  # on lease acquisition.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ugallu-webhook-auditor
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ugallu-webhook-auditor
subjects:
  - kind: ServiceAccount
    name: ugallu-webhook-auditor
    namespace: {{ include "rbac.ns.system" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ugallu-webhook-auditor
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["ugallu-webhook-auditor-leader"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ugallu-webhook-auditor
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ugallu-webhook-auditor
subjects:
  - kind: ServiceAccount
    name: ugallu-webhook-auditor
    namespace: {{ include "rbac.ns.system" . }}
{{- /* Per-namespace Secret read for caBundle indirect deref. */}}
{{- range $idx, $ns := .Values.webhookAuditor.trustedCASources | default list }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ugallu-webhook-auditor-cabundle
  namespace: {{ $ns }}
  labels:
    {{- include "rbac.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ugallu-webhook-auditor-cabundle
  namespace: {{ $ns }}
  labels:
    {{- include "rbac.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ugallu-webhook-auditor-cabundle
subjects:
  - kind: ServiceAccount
    name: ugallu-webhook-auditor
    namespace: {{ include "rbac.ns.system" $ }}
{{- end }}
{{- end }}
