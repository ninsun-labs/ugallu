{{- if .Values.auditDetection.enabled }}
{{- /*
ugallu-audit-detection RBAC.

Two deployment shapes share one operator binary, picked at install
time via audit-detection.source.mode:

  - webhook (default): singleton Deployment in ugallu-system (PSA
    restricted). The audit log content arrives over HTTPS from the
    apiserver, no host access needed.

  - file: DaemonSet in ugallu-system-privileged (PSA privileged) so
    it can hostPath-mount the kubelet/apiserver audit log. Subject
    snapshots come from the resolver gRPC.

Both shapes share one ClusterRole; per-mode SA + Role + RoleBinding
live in the matching namespace so leader-election leases stay scoped
correctly.
*/ -}}
# --- ServiceAccounts (one per namespace) ---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ugallu-audit-detection
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ugallu-audit-detection
  namespace: {{ include "rbac.ns.privileged" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ugallu-audit-detection
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  # Emit SecurityEvent only (no read on existing CR).
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents"]
    verbs: ["create"]

  # Watch SigmaRule CRDs and surface compile/match status back.
  - apiGroups: ["security.ugallu.io"]
    resources: ["sigmarules"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["sigmarules/status"]
    verbs: ["update", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ugallu-audit-detection
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ugallu-audit-detection
subjects:
  - kind: ServiceAccount
    name: ugallu-audit-detection
    namespace: {{ include "rbac.ns.system" . }}
  - kind: ServiceAccount
    name: ugallu-audit-detection
    namespace: {{ include "rbac.ns.privileged" . }}
---
# --- Namespaced Role + Binding for ugallu-system (webhook mode) ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ugallu-audit-detection
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  - apiGroups: ["security.ugallu.io"]
    resources: ["auditdetectionconfigs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["ugallu-audit-detection-leader"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ugallu-audit-detection
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ugallu-audit-detection
subjects:
  - kind: ServiceAccount
    name: ugallu-audit-detection
    namespace: {{ include "rbac.ns.system" . }}
---
# --- Namespaced Role + Binding for ugallu-system-privileged (file mode) ---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ugallu-audit-detection
  namespace: {{ include "rbac.ns.privileged" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  - apiGroups: ["security.ugallu.io"]
    resources: ["auditdetectionconfigs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["ugallu-audit-detection-leader"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ugallu-audit-detection
  namespace: {{ include "rbac.ns.privileged" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ugallu-audit-detection
subjects:
  - kind: ServiceAccount
    name: ugallu-audit-detection
    namespace: {{ include "rbac.ns.privileged" . }}
{{- end }}
