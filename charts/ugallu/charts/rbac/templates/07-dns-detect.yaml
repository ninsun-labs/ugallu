{{- if .Values.dnsDetect.enabled }}
{{- /*
ugallu-dns-detect RBAC.

DaemonSet (one replica per node) in ugallu-system. Wave 3 Sprint 3
ships scaffolding RBAC: SA + minimal ClusterRole for SE emit + own
config CR. Lease + plugin Secret read + ConfigMap blocklist read
extend in Sprint 3 commit 4 (chart real).
*/ -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: ugallu-dns-detect
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: ugallu-dns-detect
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  - apiGroups: ["security.ugallu.io"]
    resources: ["securityevents"]
    verbs: ["create"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["dnsdetectconfigs"]
    verbs: ["get", "list", "watch"]
  - apiGroups: ["security.ugallu.io"]
    resources: ["dnsdetectconfigs/status"]
    verbs: ["update", "patch"]
  # client-go's leader-election event broadcaster posts a v1.Event
  # on lease acquisition.
  - apiGroups: [""]
    resources: ["events"]
    verbs: ["create", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: ugallu-dns-detect
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: ugallu-dns-detect
subjects:
  - kind: ServiceAccount
    name: ugallu-dns-detect
    namespace: {{ include "rbac.ns.system" . }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ugallu-dns-detect
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
rules:
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    resourceNames: ["ugallu-dns-detect-leader"]
    verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
  - apiGroups: ["coordination.k8s.io"]
    resources: ["leases"]
    verbs: ["create"]
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["ugallu-coredns-grpc-token"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ugallu-dns-detect
  namespace: {{ include "rbac.ns.system" . }}
  labels:
    {{- include "rbac.labels" . | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ugallu-dns-detect
subjects:
  - kind: ServiceAccount
    name: ugallu-dns-detect
    namespace: {{ include "rbac.ns.system" . }}
{{- /* Per-namespace ConfigMap read for the blocklist. Renders one
       Role+RoleBinding pair for every namespace in
       .Values.dnsDetect.blocklistNamespaces (default: just the
       chart-shipped ugallu-dns-blocklists). Admins extending the
       blocklist source list must mirror values here. */ -}}
{{- range $ns := .Values.dnsDetect.blocklistNamespaces | default (list "ugallu-dns-blocklists") }}
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: ugallu-dns-detect-blocklist
  namespace: {{ $ns }}
  labels:
    {{- include "rbac.labels" $ | nindent 4 }}
rules:
  - apiGroups: [""]
    resources: ["configmaps"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: ugallu-dns-detect-blocklist
  namespace: {{ $ns }}
  labels:
    {{- include "rbac.labels" $ | nindent 4 }}
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: ugallu-dns-detect-blocklist
subjects:
  - kind: ServiceAccount
    name: ugallu-dns-detect
    namespace: {{ include "rbac.ns.system" $ }}
{{- end }}
{{- end }}
