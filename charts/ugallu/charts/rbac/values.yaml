# rbac subchart defaults. Most values come from .Values.global.* (see umbrella).
global:
  namespaces:
    system: ugallu-system
    privileged: ugallu-system-privileged

# Per-component toggles. Disable a component's RBAC if you choose not to
# deploy that component (e.g., forensics on Wave 2 environments where
# IR is not enabled yet).
resolver:
  enabled: true
attestor:
  enabled: true
ttl:
  enabled: true
auditDetection:
  enabled: true
forensics:
  enabled: true
gitopsResponder:
  enabled: true
backpressure:
  enabled: true
webhookAuditor:
  enabled: true
  # Namespace allowlist where the operator can read Secret data to
  # dereference cert-manager-style indirect caBundle references
  # (annotation cert-manager.io/inject-ca-from-secret). The default
  # mirrors WebhookAuditorConfig.spec.trustedCASources defaults; admins
  # who add their own trustedCASources values must mirror them here
  # via `helm upgrade --set rbac.webhookAuditor.trustedCASources='{...}'`.
  trustedCASources:
    - cert-manager
    - kube-system

# Cluster-flavor toggles. ciliumNetworkPolicies grants forensics CAP to
# create/delete CiliumNetworkPolicy resources for PodFreeze. Disable if
# the cluster does not run Cilium CNI.
ciliumNetworkPolicies: true
