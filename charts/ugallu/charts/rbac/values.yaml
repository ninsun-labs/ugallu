# rbac subchart defaults. Most values come from .Values.global.* (see umbrella).
global:
  namespaces:
    system: ugallu-system
    privileged: ugallu-system-privileged

# Per-component toggles. Disable a component's RBAC if you choose not to
# deploy that component (e.g., forensics on Wave 2 environments where
# IR is not enabled yet).
resolver:
  enabled: true
attestor:
  enabled: true
ttl:
  enabled: true
auditDetection:
  enabled: true
forensics:
  enabled: true
gitopsResponder:
  enabled: true
backpressure:
  enabled: true
webhookAuditor:
  enabled: true

# Cluster-flavor toggles. ciliumNetworkPolicies grants forensics CAP to
# create/delete CiliumNetworkPolicy resources for PodFreeze. Disable if
# the cluster does not run Cilium CNI.
ciliumNetworkPolicies: true
