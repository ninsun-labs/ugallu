apiVersion: apps/v1
kind: Deployment
metadata:
  name: ugallu-tenant-escape
  namespace: {{ include "tenantescape.namespace" . }}
  labels:
    {{- include "tenantescape.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      {{- include "tenantescape.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "tenantescape.labels" . | nindent 8 }}
      annotations:
        ugallu.io/scaffold: {{ .Values.placeholder | quote }}
    spec:
      serviceAccountName: ugallu-tenant-escape
      priorityClassName: system-cluster-critical
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 65532
        runAsGroup: 65532
        fsGroup: 65532
        seccompProfile:
          type: RuntimeDefault
      containers:
        - name: tenant-escape
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          {{- if .Values.placeholder }}
          command: ["/bin/sleep", "infinity"]
          {{- else }}
          command: {{ .Values.command | default (list "/ugallu-tenant-escape") | toJson }}
          args:
            {{- if .Values.args }}
            {{- toYaml .Values.args | nindent 12 }}
            {{- else }}
            - --metrics-bind-address=:{{ .Values.metricsPort }}
            - --health-probe-bind-address=:{{ .Values.healthProbePort }}
            - --leader-election-namespace={{ include "tenantescape.namespace" . }}
            - --cluster-id={{ .Values.clusterIdentity.clusterID | default "" }}
            - --cluster-name={{ .Values.clusterIdentity.clusterName | default "" }}
            - --audit-bus-endpoint={{ .Values.auditBus.endpoint }}
            - --audit-bus-consumer-name={{ .Values.auditBus.consumerName | default "tenant-escape" }}
            {{- end }}
          {{- end }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metricsPort }}
              protocol: TCP
            - name: health
              containerPort: {{ .Values.healthProbePort }}
              protocol: TCP
          env:
            - name: AUDIT_BUS_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.auditBus.tokenSecret.name }}
                  key: {{ .Values.auditBus.tokenSecret.key }}
                  optional: true
          {{- if not .Values.placeholder }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: health
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: health
            initialDelaySeconds: 5
            periodSeconds: 10
          {{- end }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
