global:
  namespaces:
    system: ugallu-system

clusterIdentity:
  clusterID: ""
  clusterName: ""

# audit-detection event bus consumer config (Wave 3 §S2). The bus is
# enabled by setting AuditDetectionConfig.spec.eventBus.enabled=true
# in the audit-detection subchart values; the endpoint here matches
# the audit-detection bus Service.
auditBus:
  endpoint: "ugallu-audit-detection-bus.ugallu-system.svc.cluster.local:8444"
  consumerName: "tenant-escape"
  tokenSecret:
    name: ugallu-audit-bus-token
    key: token

# When true the chart ships a sleep-forever placeholder so the pod
# stays Ready before the real binary is published. Flip to false in
# environment overlays once
# ghcr.io/ninsun-labs/ugallu/tenant-escape:<chart-tag> exists.
placeholder: true
image:
  repository: ghcr.io/ninsun-labs/ugallu/tenant-escape
  tag: "v0.0.1-alpha.1"
  pullPolicy: IfNotPresent

# Cluster-wide leader-elect Deployment (design 21 §T1). Cross-tenant
# correlation requires a global view (a SA in one ns touching a
# Secret in another) — a DaemonSet wouldn't help.
replicas: 2

resources:
  requests:
    cpu: "30m"
    memory: "128Mi"
  limits:
    cpu: "300m"
    memory: "512Mi"

metricsPort: 9090
healthProbePort: 8081

# Clusters running CiliumNetworkPolicy. Disabling drops the
# CrossTenantNetworkPolicy detector's ciliumnetworkpolicies arm —
# the kube-native NetworkPolicy arm keeps firing.
ciliumNetworkPolicies: true

nodeSelector: {}
tolerations: []
affinity: {}
