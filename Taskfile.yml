version: '3'

vars:
  GO_MODULES:
    sh: find . -name "go.mod" -not -path "./.git/*" -not -path "./vendor/*" -exec dirname {} \;

tasks:
  default:
    cmds:
      - task --list-all

  doctor:
    desc: Preflight check of dev tooling
    cmds:
      - go version
      - go env GOPATH
      - command -v golangci-lint >/dev/null && golangci-lint version || echo "MISSING golangci-lint"
      - command -v ko >/dev/null && ko version || echo "MISSING ko"
      - command -v controller-gen >/dev/null && controller-gen --version || echo "MISSING controller-gen"
      - command -v protoc >/dev/null && protoc --version || echo "MISSING protoc"
      - command -v task >/dev/null && task --version || echo "MISSING task (you should not see this)"
      - command -v cosign >/dev/null && cosign version --json | head -5 || echo "MISSING cosign"
    silent: true

  tidy:
    desc: Run go mod tidy in every module
    cmds:
      - for: { var: GO_MODULES }
        cmd: |
          echo "==> tidy {{.ITEM}}"
          (cd {{.ITEM}} && go mod tidy)

  build:
    desc: Build every Go module (output to bin/, not module roots)
    cmds:
      - mkdir -p bin
      - for: { var: GO_MODULES }
        cmd: |
          echo "==> build {{.ITEM}}"
          (cd {{.ITEM}} && go build -o /dev/null ./...)

  build:bin:
    desc: Build binaries into bin/ (host arch, dev convenience)
    cmds:
      - mkdir -p bin
      - go build -o bin/ugallu-resolver ./resolver/cmd/ugallu-resolver
      - go build -o bin/ugallu-attestor ./attestor/cmd/ugallu-attestor
      - go build -o bin/ugallu-ttl ./ttl/cmd/ugallu-ttl
      - go build -o bin/ugallu-backpressure ./backpressure/cmd/ugallu-backpressure
      - go build -o bin/ugallu-gitops-responder ./operators/gitops-responder/cmd/ugallu-gitops-responder
      - go build -o bin/ugallu ./cmd/ugallu
      - go build -o bin/ugallu-audit-detection ./operators/audit-detection/cmd/ugallu-audit-detection
      - go build -o bin/ugallu-forensics ./operators/forensics/cmd/ugallu-forensics
      - go build -o bin/ugallu-forensics-snapshot ./operators/forensics/cmd/ugallu-forensics-snapshot

  build:images:
    desc: |
      Cross-compile every binary linux/amd64 + build the matching
      per-binary OCI image into the local podman engine. Tag is
      `ghcr.io/ninsun-labs/ugallu/<binary>:dev` by default; CI
      overrides via IMAGE_REGISTRY + IMAGE_TAG env.
    vars:
      REGISTRY: '{{.IMAGE_REGISTRY | default "ghcr.io/ninsun-labs/ugallu"}}'
      TAG:      '{{.IMAGE_TAG | default "dev"}}'
      BINARIES:
        - "attestor:./attestor/cmd/ugallu-attestor"
        - "ttl:./ttl/cmd/ugallu-ttl"
        - "backpressure:./backpressure/cmd/ugallu-backpressure"
        - "gitops-responder:./operators/gitops-responder/cmd/ugallu-gitops-responder"
        - "resolver:./resolver/cmd/ugallu-resolver"
        - "audit-detection:./operators/audit-detection/cmd/ugallu-audit-detection"
        - "forensics:./operators/forensics/cmd/ugallu-forensics"
        - "forensics-snapshot:./operators/forensics/cmd/ugallu-forensics-snapshot"
        - "webhook-auditor:./operators/webhook-auditor/cmd/ugallu-webhook-auditor"
        - "dns-detect:./operators/dns-detect/cmd/ugallu-dns-detect"
    cmds:
      - mkdir -p build/_artifacts
      - for:
          var: BINARIES
          as: spec
        cmd: |
          name="{{splitList ":" .spec | first}}"
          pkg="{{splitList ":" .spec | last}}"
          echo "==> build $name (linux/amd64)"
          CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' \
            -o build/_artifacts/${name}-bin "$pkg"
          echo "==> image {{.REGISTRY}}/${name}:{{.TAG}}"
          podman build \
            --build-arg BINARY=${name} \
            --build-arg BIN_FILE=${name}-bin \
            -t {{.REGISTRY}}/${name}:{{.TAG}} \
            -f build/Dockerfile.per-binary \
            build/_artifacts

  build:image-multi:
    desc: |
      Build the multi-binary lab image localhost/ugallu-runtime:dev
      (one tarball per node, fast dev loop). Use this for the lab
      ssh+ctr workflow; CI uses build:images for the per-binary
      production publish.
    cmds:
      - task: build:bin-linux
      - cd build/_artifacts && cp ../Dockerfile . && podman build --no-cache -t localhost/ugallu-runtime:dev -f Dockerfile .

  build:bin-linux:
    desc: Cross-compile every binary into build/_artifacts/ (linux/amd64).
    cmds:
      - mkdir -p build/_artifacts
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o build/_artifacts/attestor-bin ./attestor/cmd/ugallu-attestor
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o build/_artifacts/ttl-bin ./ttl/cmd/ugallu-ttl
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o build/_artifacts/backpressure-bin ./backpressure/cmd/ugallu-backpressure
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o build/_artifacts/gitops-responder-bin ./operators/gitops-responder/cmd/ugallu-gitops-responder
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o build/_artifacts/resolver-bin ./resolver/cmd/ugallu-resolver
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o build/_artifacts/audit-detection-bin ./operators/audit-detection/cmd/ugallu-audit-detection
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o build/_artifacts/forensics-bin ./operators/forensics/cmd/ugallu-forensics
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o build/_artifacts/forensics-snapshot-bin ./operators/forensics/cmd/ugallu-forensics-snapshot
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o build/_artifacts/webhook-auditor-bin ./operators/webhook-auditor/cmd/ugallu-webhook-auditor
      - CGO_ENABLED=0 GOOS=linux GOARCH=amd64 go build -trimpath -ldflags='-s -w' -o build/_artifacts/dns-detect-bin ./operators/dns-detect/cmd/ugallu-dns-detect

  test:
    desc: Run go test (-race) on every module (envtest assets auto-fetched)
    deps: [envtest:install]
    env:
      KUBEBUILDER_ASSETS:
        sh: setup-envtest use 1.32 -p path
    cmds:
      - for: { var: GO_MODULES }
        cmd: |
          echo "==> test {{.ITEM}}"
          (cd {{.ITEM}} && go test -race -timeout 120s ./...)

  envtest:install:
    desc: Install controller-runtime setup-envtest tool (no-op if present)
    cmds:
      - 'command -v setup-envtest >/dev/null || go install sigs.k8s.io/controller-runtime/tools/setup-envtest@latest'

  envtest:assets:
    desc: Fetch envtest kube-apiserver + etcd binaries for K8s 1.32
    deps: [envtest:install]
    cmds:
      - setup-envtest use 1.32 -p path

  ci-local:
    desc: Run the full CI pipeline locally (build + lint + test + helm + drift + parity)
    cmds:
      - bash hack/ci-local.sh

  lint:
    desc: Run golangci-lint per module (workspace-aware, skip empty modules)
    cmds:
      - for: { var: GO_MODULES }
        cmd: |
          if find {{.ITEM}} -maxdepth 5 -name "*.go" -not -path "*/vendor/*" | head -1 | grep -q .; then
            echo "==> lint {{.ITEM}}"
            (cd {{.ITEM}} && golangci-lint run ./...)
          else
            echo "==  skip {{.ITEM}} (no .go files yet)"
          fi

  fmt:
    desc: Format Go code (gofumpt + goimports)
    cmds:
      - gofumpt -l -w .
      - goimports -l -w .

  generate:
    desc: Run all code generation (proto, controller-gen object + crd, fmt)
    deps: [generate:proto, generate:deepcopy, generate:crd]
    cmds:
      - echo "==> gofumpt + goimports"
      - gofumpt -l -w sdk/pkg/api/v1alpha1/ sdk/pkg/resolver/clientv1/
      - goimports -l -w sdk/pkg/api/v1alpha1/ sdk/pkg/resolver/clientv1/

  generate:proto:
    desc: Generate Go gRPC stubs from .proto files
    cmds:
      - mkdir -p sdk/pkg/resolver/clientv1
      - |
        protoc \
          --proto_path=sdk/proto \
          --go_out=sdk --go_opt=module=github.com/ninsun-labs/ugallu/sdk \
          --go-grpc_out=sdk --go-grpc_opt=module=github.com/ninsun-labs/ugallu/sdk \
          sdk/proto/resolver/v1/resolver.proto

  generate:deepcopy:
    desc: Run controller-gen object (zz_generated.deepcopy.go)
    cmds:
      - cd sdk && controller-gen object paths=./pkg/api/v1alpha1/...

  generate:crd:
    desc: Run controller-gen crd (CRD YAML to crds/bases)
    cmds:
      - cd sdk && controller-gen crd paths=./pkg/api/v1alpha1/... output:crd:dir=../crds/bases

  e2e:
    desc: Run E2E tests on a kind cluster
    cmds:
      - echo "TODO kind cluster bootstrap + ginkgo run"

  release:
    desc: Build images, sign, push (goreleaser + ko + cosign)
    cmds:
      - echo "TODO goreleaser release --clean"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ dist/ out/
      - find . -name '*.test' -delete
      - find . -name '*.out' -delete
