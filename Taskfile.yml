version: '3'

vars:
  GO_MODULES:
    sh: find . -name "go.mod" -not -path "./.git/*" -not -path "./vendor/*" -exec dirname {} \;

tasks:
  default:
    cmds:
      - task --list-all

  doctor:
    desc: Preflight check of dev tooling
    cmds:
      - go version
      - go env GOPATH
      - command -v golangci-lint >/dev/null && golangci-lint version || echo "MISSING golangci-lint"
      - command -v ko >/dev/null && ko version || echo "MISSING ko"
      - command -v controller-gen >/dev/null && controller-gen --version || echo "MISSING controller-gen"
      - command -v protoc >/dev/null && protoc --version || echo "MISSING protoc"
      - command -v task >/dev/null && task --version || echo "MISSING task (you should not see this)"
      - command -v cosign >/dev/null && cosign version --json | head -5 || echo "MISSING cosign"
    silent: true

  tidy:
    desc: Run go mod tidy in every module
    cmds:
      - for: { var: GO_MODULES }
        cmd: |
          echo "==> tidy {{.ITEM}}"
          (cd {{.ITEM}} && go mod tidy)

  build:
    desc: Build every Go module (output to bin/, not module roots)
    cmds:
      - mkdir -p bin
      - for: { var: GO_MODULES }
        cmd: |
          echo "==> build {{.ITEM}}"
          (cd {{.ITEM}} && go build -o /dev/null ./...)

  build:bin:
    desc: Build binaries into bin/
    cmds:
      - mkdir -p bin
      - go build -o bin/ugallu-resolver ./resolver/cmd/ugallu-resolver
      - go build -o bin/ugallu-attestor ./attestor/cmd/ugallu-attestor
      - go build -o bin/ugallu-ttl ./ttl/cmd/ugallu-ttl
      - go build -o bin/ugallu ./cmd/ugallu
      - go build -o bin/ugallu-audit-detection ./operators/audit-detection/cmd/ugallu-audit-detection
      - go build -o bin/ugallu-forensics ./operators/forensics/cmd/ugallu-forensics

  test:
    desc: Run go test (-race) on every module
    cmds:
      - for: { var: GO_MODULES }
        cmd: |
          echo "==> test {{.ITEM}}"
          (cd {{.ITEM}} && go test -race -timeout 120s ./...)

  lint:
    desc: Run golangci-lint per module (workspace-aware, skip empty modules)
    cmds:
      - for: { var: GO_MODULES }
        cmd: |
          if find {{.ITEM}} -maxdepth 5 -name "*.go" -not -path "*/vendor/*" | head -1 | grep -q .; then
            echo "==> lint {{.ITEM}}"
            (cd {{.ITEM}} && golangci-lint run ./...)
          else
            echo "==  skip {{.ITEM}} (no .go files yet)"
          fi

  fmt:
    desc: Format Go code (gofumpt + goimports)
    cmds:
      - gofumpt -l -w .
      - goimports -l -w .

  generate:
    desc: Run code generation (controller-gen object + crd, protoc later)
    cmds:
      - echo "==> controller-gen object (deepcopy)"
      - cd sdk && controller-gen object paths=./pkg/api/v1alpha1/...
      - echo "==> controller-gen crd"
      - cd sdk && controller-gen crd paths=./pkg/api/v1alpha1/... output:crd:dir=../crds/bases
      - echo "==> gofumpt + goimports"
      - gofumpt -l -w sdk/pkg/api/v1alpha1/
      - goimports -l -w sdk/pkg/api/v1alpha1/

  e2e:
    desc: Run E2E tests on a kind cluster
    cmds:
      - echo "TODO kind cluster bootstrap + ginkgo run"

  release:
    desc: Build images, sign, push (goreleaser + ko + cosign)
    cmds:
      - echo "TODO goreleaser release --clean"

  clean:
    desc: Remove build artifacts
    cmds:
      - rm -rf bin/ dist/ out/
      - find . -name '*.test' -delete
      - find . -name '*.out' -delete
