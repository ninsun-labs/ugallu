name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - name: Build all modules
        run: |
          set -e
          for mod in $(find . -name go.mod -not -path "./.git/*" -not -path "./vendor/*" -exec dirname {} \;); do
            echo "==> build $mod"
            (cd "$mod" && go build ./...)
          done

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - name: Test all modules
        run: |
          set -e
          for mod in $(find . -name go.mod -not -path "./.git/*" -not -path "./vendor/*" -exec dirname {} \;); do
            echo "==> test $mod"
            (cd "$mod" && go test -race -timeout 120s ./...)
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m
