name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - name: Build all modules
        run: |
          set -e
          for mod in $(find . -name go.mod -not -path "./.git/*" -not -path "./vendor/*" -exec dirname {} \;); do
            echo "==> build $mod"
            (cd "$mod" && go build ./...)
          done

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - name: Test all modules
        run: |
          set -e
          for mod in $(find . -name go.mod -not -path "./.git/*" -not -path "./vendor/*" -exec dirname {} \;); do
            echo "==> test $mod"
            (cd "$mod" && go test -race -timeout 120s ./...)
          done

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.26.2'
          cache: true
      - name: Install golangci-lint v2
        run: go install github.com/golangci/golangci-lint/v2/cmd/golangci-lint@latest
      - name: Run golangci-lint per module (skip empty modules)
        run: |
          set -e
          for mod in $(find . -name go.mod -not -path "./.git/*" -not -path "./vendor/*" -exec dirname {} \;); do
            if find "$mod" -maxdepth 5 -name "*.go" -not -path "*/vendor/*" | head -1 | grep -q .; then
              echo "==> lint $mod"
              (cd "$mod" && golangci-lint run --timeout=5m ./...)
            else
              echo "==  skip $mod (no .go files yet)"
            fi
          done
